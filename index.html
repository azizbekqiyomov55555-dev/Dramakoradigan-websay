<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PREMIUM</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #000; --accent: #00ff73; --card: #121212; --border: #222; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .tap-active { transition: transform 0.1s ease; cursor: pointer; }
        .tap-active:active { transform: scale(0.95); opacity: 0.8; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .siz-btn-oval { display: inline-flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 4px 14px; border-radius: 30px; border: 1.5px solid #333; }
        .nav-avatar-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .page { display: none; padding: 15px 5%; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .movie-card { width: 100%; position: relative; }
        .movie-card img { width: 100%; height: 160px; border-radius: 20px; object-fit: cover; border: 1px solid var(--border); }
        .price-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #000; padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 5; }
        .online-status { color: var(--accent); font-size: 12px; font-weight: bold; margin-left: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .detail-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .detail-hero { position: relative; width: 100%; height: 500px; }
        .detail-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        .detail-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, #000 15%, transparent 70%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; box-sizing: border-box; }
        .d-title { font-size: 40px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .part-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .part-btn { background: #111; border: 1.5px solid #333; color: white; padding: 14px; border-radius: 12px; text-align: center; font-size: 13px; }
        .part-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-play-green { background: linear-gradient(90deg, #00ff73, #00cc5c); color: #000; width: 100%; padding: 18px; border-radius: 15px; font-size: 19px; font-weight: 900; border: none; display: flex; align-items: center; justify-content: center; gap: 15px; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2500; overflow-y: auto; }
        .modal-content { background: #111; border-radius: 30px; padding: 25px; margin: 50px 15px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-adm { background: var(--accent); color: #000; width: 100%; padding: 16px; border-radius: 12px; font-weight: 900; border: none; margin-bottom: 10px; }
        .hero-swiper { width: 100%; height: 350px; margin-bottom: 20px; }
        .swiper-slide { width: 85% !important; border-radius: 30px; overflow: hidden; transform: scale(0.9); transition: 0.3s; }
        .swiper-slide-active { transform: scale(1); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .delete-list-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="swiper hero-swiper"><div class="swiper-wrapper" id="heroList"></div></div>
        <div style="font-weight: 900; font-size: 20px; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px;">Kinolar</div>
        <div class="movie-grid" id="normalList"></div>
    </div>

    <div id="search" class="page">
        <input type="text" id="searchInput" placeholder="Kino nomini yozing..." oninput="searchMovie()" style="margin-top:20px;">
        <div class="movie-grid" id="searchResult"></div>
    </div>

    <div id="mening" class="page">
        <h3>Oxirgi ko'rilganlar</h3>
        <div id="historyList" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:15px;"></div>
        <h3>To'lovlar tarixi</h3>
        <div id="trxList"></div>
    </div>

    <div id="siz" class="page">
        <div style="display: flex; align-items: center; gap: 20px; padding: 30px 0;">
            <img src="" id="mainAvatar" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--accent);">
            <div><div style="display: flex; align-items: center;"><h2 id="tgName" style="margin:0;">Foydalanuvchi</h2><span class="online-status">● Onlayn</span></div>
            <div id="premTimer" style="font-size: 12px; color: var(--accent); margin-top: 5px;"></div></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="status-card tap-active" onclick="openPremModal()" style="background:#111; padding:20px; border-radius:25px;">
                <span style="color:#ff453a; font-size:11px;">PREMIUM</span><br><strong style="font-size:18px;">Sotib olish</strong>
            </div>
            <div class="status-card tap-active" onclick="openDepModal()" style="background:#111; padding:20px; border-radius:25px;">
                <span style="color:#888; font-size:11px;">HISOB</span><br><strong id="userBalance" style="font-size:18px;">0 so'm</strong>
            </div>
        </div>
        <div style="margin-top:20px; background:#111; border-radius:20px; overflow:hidden;">
            <div class="tap-active" style="padding:18px; border-bottom:1px solid #222;" onclick="showAdminLogin()"><i class="fa fa-user-shield" style="margin-right:15px; color:var(--accent);"></i> Admin Panel</div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="modal">
        <div style="padding:20px;">
            <h2 style="display:flex; justify-content:space-between;">Admin <span onclick="closeModal('adminPanel')">&times;</span></h2>
            
            <div class="modal-content">
                <h3>Sozlamalar</h3>
                <input type="text" id="setToken" placeholder="Bot Token">
                <input type="text" id="setAdminId" placeholder="Admin Chat ID">
                <input type="text" id="setCard" placeholder="Karta raqami">
                <button class="btn-adm" onclick="saveSettings()">SAQLASH</button>
            </div>

            <div class="modal-content">
                <h3>Yangi Kino</h3>
                <input type="text" id="kTitle" placeholder="Kino nomi">
                <input type="text" id="kGenre" placeholder="Janr">
                <input type="number" id="kPrice" placeholder="Narxi (0 bo'lsa tekin)">
                <small>Poster:</small><input type="file" id="kPoster" accept="image/*">
                <div id="vFields"><div style="padding:10px; border:1px dashed #444; margin-bottom:10px;"><small>1-qism:</small><input type="file" class="vInps" accept="video/*"></div></div>
                <button class="btn-adm" style="background:#333; color:#fff;" onclick="addVField()">+ Qism qo'shish</button>
                <button class="btn-adm" onclick="saveKino()">KINONI YUKLASH</button>
            </div>

            <div class="modal-content">
                <h3>Kinolarni o'chirish</h3>
                <div id="adminMovieList"></div>
            </div>
        </div>
    </div>

    <!-- OTHER MODALS -->
    <div id="loginModal" class="modal"><div class="modal-content" style="max-width:300px; margin:150px auto;"><h3>Admin Parol</h3><input type="password" id="admPass"><button class="btn-adm" onclick="checkAdmin()">KIRISH</button></div></div>
    
    <div id="depModal" class="modal">
        <div class="modal-content">
            <h2>To'lov qilish</h2>
            <div id="cardText" style="background:linear-gradient(90deg,#00ff73,#008f41); padding:20px; border-radius:15px; color:#000; font-weight:900; margin-bottom:15px;" onclick="copyCard()">Karta yuklanmoqda...</div>
            <input type="number" id="dSum" placeholder="Summani kiriting">
            <input type="file" id="dImg" accept="image/*">
            <button class="btn-adm" onclick="sendDep()">TASDIQLASHGA YUBORISH</button>
            <button class="btn-adm" style="background:none; color:#fff;" onclick="closeModal('depModal')">YOPISH</button>
        </div>
    </div>

    <!-- PLAYER & DETAIL -->
    <div id="detailPage" class="detail-page">
        <i class="fa fa-arrow-left" onclick="closeDetail()" style="position:fixed; top:25px; left:20px; z-index:2100; font-size:22px;"></i>
        <div id="detailContent"></div>
    </div>
    <div id="player">
        <i class="fa fa-arrow-left" onclick="closePlayer()" style="position:absolute; top:25px; left:20px; z-index:3020; font-size:22px;"></i>
        <video id="mainVideo" style="width:100%; height:100%;" playsinline controls></video>
    </div>

    <!-- NAV -->
    <div class="bottom-nav">
        <div class="nav-item active tap-active" onclick="showPage('home', this)"><i class="fa fa-home"></i><br>Asosiy</div>
        <div class="nav-item tap-active" onclick="showPage('search', this)"><i class="fa fa-search"></i><br>Qidiruv</div>
        <div class="nav-item tap-active" onclick="showPage('mening', this)"><i class="fa fa-bookmark"></i><br>Mening</div>
        <div class="nav-item tap-active" onclick="showPage('siz', this)"><div class="siz-btn-oval"><img src="" id="navAvatar" class="nav-avatar-img"><b>Siz</b></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const db = new Dexie("KinoDrama_DB_V2");
        db.version(1).stores({
            movies: "++id, title, genre, price",
            profile: "key, value",
            settings: "key, value",
            trxs: "++id, amount, date"
        });

        const tg = window.Telegram.WebApp;
        let moviesCache = [];

        async function init() {
            if(!(await db.profile.get('balance'))) await db.profile.put({key:'balance', value: 0});
            if(!(await db.settings.get('card'))) await db.settings.put({key:'card', value: '8600 0000 0000 0000'});
            
            // Sozlamalarni admin panelga yuklash
            const token = await db.settings.get('token');
            const admin_id = await db.settings.get('admin_id');
            const card = await db.settings.get('card');
            if(token) document.getElementById('setToken').value = token.value;
            if(admin_id) document.getElementById('setAdminId').value = admin_id.value;
            if(card) {
                document.getElementById('setCard').value = card.value;
                document.getElementById('cardText').innerText = card.value;
            }

            if (tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('tgName').innerText = u.first_name;
                document.getElementById('mainAvatar').src = u.photo_url || "https://ui-avatars.com/api/?name="+u.first_name;
                document.getElementById('navAvatar').src = u.photo_url || "https://ui-avatars.com/api/?name="+u.first_name;
            }

            loadContent();
            updateBalanceUI();
            tg.expand();
        }

        async function updateBalanceUI() {
            const bal = await db.profile.get('balance');
            document.getElementById('userBalance').innerText = (bal.value || 0).toLocaleString() + " so'm";
        }

        // QIDIRUV FUNKSIYASI
        async function searchMovie() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = moviesCache.filter(m => m.title.toLowerCase().includes(query));
            const container = document.getElementById('searchResult');
            container.innerHTML = '';
            results.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                container.innerHTML += `<div class="movie-card tap-active" onclick="openMovie(${m.id})"><img src="${img}"><div style="font-weight:900;margin-top:8px;">${m.title}</div></div>`;
            });
        }

        // TO'LOVNI BOTGA YUBORISH
        async function sendDep() {
            const sum = document.getElementById('dSum').value;
            const token = (await db.settings.get('token'))?.value;
            const adminId = (await db.settings.get('admin_id'))?.value;
            const user = tg.initDataUnsafe.user || {first_name: "User", id: "Noma'lum"};

            if(!sum || !token || !adminId) return alert("Ma'lumotlar to'liq emas!");

            const text = `💰 TO'LOV XABARI:\n👤 Kimdan: ${user.first_name}\n🆔 ID: ${user.id}\n💵 Summa: ${sum} so'm\n\nIltimos, chekni tekshirib balansi to'ldiring.`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent(text)}`)
            .then(res => {
                alert("Xabar adminga yuborildi! Tekshirilgandan so'ng hisobingizga tushadi.");
                closeModal('depModal');
            })
            .catch(err => alert("Xatolik: Bot sozlamalarini tekshiring!"));
        }

        // ADMIN: KINONI SAQLASH
        async function saveKino() {
            const title = document.getElementById('kTitle').value;
            const genre = document.getElementById('kGenre').value;
            const price = parseInt(document.getElementById('kPrice').value) || 0;
            const poster = document.getElementById('kPoster').files[0];
            let videos = [];
            document.querySelectorAll('.vInps').forEach(i => { if(i.files[0]) videos.push(i.files[0]); });

            if(!title || !poster || videos.length === 0) return alert("Barcha maydonlarni to'ldiring!");

            await db.movies.add({ title, genre, price, poster, videos });
            alert("Kino muvaffaqiyatli joylandi!");
            
            // Formani tozalash
            document.getElementById('kTitle').value = '';
            document.getElementById('kGenre').value = '';
            document.getElementById('kPrice').value = '';
            document.getElementById('kPoster').value = '';
            document.getElementById('vFields').innerHTML = '<div style="padding:10px; border:1px dashed #444; margin-bottom:10px;"><small>1-qism:</small><input type="file" class="vInps" accept="video/*"></div>';
            
            loadContent();
        }

        // ADMIN: KINONI O'CHIRISH
        async function deleteMovie(id) {
            if(confirm("Haqiqatdan ham o'chirmoqchimisiz?")) {
                await db.movies.delete(id);
                loadContent();
            }
        }

        async function loadContent() {
            moviesCache = await db.movies.toArray();
            const hL = document.getElementById('heroList');
            const nL = document.getElementById('normalList');
            const aL = document.getElementById('adminMovieList');
            
            hL.innerHTML = ''; nL.innerHTML = ''; aL.innerHTML = '';

            moviesCache.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                const badge = m.price > 0 ? `<div class="price-badge">${m.price} so'm</div>` : '';
                
                hL.innerHTML += `<div class="swiper-slide tap-active" onclick="openMovie(${m.id})">${badge}<img src="${img}" class="hero-img"></div>`;
                nL.innerHTML += `<div class="movie-card tap-active" onclick="openMovie(${m.id})">${badge}<img src="${img}"><div style="font-weight:900;margin-top:8px;">${m.title}</div></div>`;
                aL.innerHTML += `<div class="delete-list-item"><span>${m.title}</span> <button onclick="deleteMovie(${m.id})" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">O'chirish</button></div>`;
            });

            new Swiper('.hero-swiper', { slidesPerView: 'auto', centeredSlides: true, spaceBetween: 15, autoplay: {delay:3000} });
        }

        // BOSHQA FUNKSIYALAR
        function showPage(id, el) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); 
            el.classList.add('active'); 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showAdminLogin() { document.getElementById('loginModal').style.display = 'block'; }
        function checkAdmin() { if(document.getElementById('admPass').value === 'Azizbek') { closeModal('loginModal'); document.getElementById('adminPanel').style.display = 'block'; } else alert('Xato!'); }
        function openDepModal() { document.getElementById('depModal').style.display = 'block'; }
        async function saveSettings() {
            await db.settings.put({key:'token', value: document.getElementById('setToken').value});
            await db.settings.put({key:'admin_id', value: document.getElementById('setAdminId').value});
            await db.settings.put({key:'card', value: document.getElementById('setCard').value});
            alert("Sozlamalar saqlandi!");
            document.getElementById('cardText').innerText = document.getElementById('setCard').value;
        }
        function addVField() {
            const container = document.getElementById('vFields');
            const div = document.createElement('div');
            div.style = "padding:10px; border:1px dashed #444; margin-bottom:10px;";
            div.innerHTML = `<small>${container.children.length + 1}-qism:</small><input type="file" class="vInps" accept="video/*">`;
            container.appendChild(div);
        }

        async function openMovie(id) {
            const m = await db.movies.get(id);
            const poster = URL.createObjectURL(m.poster);
            let parts = m.videos.map((v, i) => `<div class="part-btn tap-active" onclick="playVideo(${id}, ${i})">${i+1}-qism</div>`).join('');
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-hero"><img src="${poster}"><div class="detail-overlay">
                <h1 class="d-title">${m.title}</h1><div style="margin:10px 0;">Janr: ${m.genre}</div>
                <div class="part-grid">${parts}</div>
                </div></div>`;
            document.getElementById('detailPage').style.display = 'block';
        }

        async function playVideo(mId, vIdx) {
            const m = await db.movies.get(mId);
            const video = m.videos[vIdx];
            const videoUrl = URL.createObjectURL(video);
            const vPlayer = document.getElementById('mainVideo');
            vPlayer.src = videoUrl;
            document.getElementById('player').style.display = 'block';
            vPlayer.play();
        }

        function closePlayer() { document.getElementById('mainVideo').pause(); document.getElementById('player').style.display = 'none'; }
        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }
        function copyCard() { navigator.clipboard.writeText(document.getElementById('cardText').innerText); alert("Karta nusxalandi!"); }

        init();
    </script>
</body>
</html>
