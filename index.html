<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PRO</title>
    
    <!-- Telegram WebApp Scripti (Avtomatik ma'lumot olish uchun) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #000;
            --accent: #00ff73;
            --card: #111;
            --border: #222;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            margin: 0; padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* --- RASMLAR DIZAYNI (Rasmdagidek) --- */
        .main-avatar-container {
            width: 85px; height: 85px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 2px; background: var(--bg);
        }
        #mainAvatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .nav-avatar-img { 
            width: 30px; height: 30px; 
            border-radius: 50%; border: 1px solid #444; 
            object-fit: cover; background: #222;
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        .siz-btn-oval {
            display: inline-flex; align-items: center; gap: 8px;
            background: #1a1a1a; padding: 4px 14px 4px 4px;
            border-radius: 30px; border: 1.5px solid #333;
        }
        .nav-item.active .siz-btn-oval { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* --- PAGES --- */
        .page { display: none; padding: 20px 5%; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS --- */
        .status-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .menu-list { background: var(--card); border-radius: 20px; margin-top: 20px; border: 1px solid var(--border); overflow: hidden; }
        .menu-item { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid #1a1a1a; }
        .menu-item i { width: 30px; color: var(--accent); font-size: 18px; }

        .tap-active:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <h2 style="text-align:center">KINO DRAMA</h2>
        <div style="text-align:center; margin-top:50px; color:#555">Slayder va kinolar yuklanmoqda...</div>
    </div>

    <!-- SIZ (PROFIL) PAGE -->
    <div id="siz" class="page">
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
            <div class="main-avatar-container">
                <img src="https://via.placeholder.com/100?text=User" id="mainAvatar">
            </div>
            <div>
                <h2 id="tgName" style="margin:0; font-size: 24px;">Mehmon</h2>
                <p id="tgStatus" style="margin:5px 0; color:#888; font-size: 14px;">onlayn</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="status-card tap-active"><span style="color:#ff453a; font-size:12px; font-weight:bold;">PREMIUM</span><br><strong>Sotib olish ></strong></div>
            <div class="status-card tap-active"><span style="color:#888; font-size:12px;">HAMYON</span><br><strong>0 so'm ></strong></div>
        </div>

        <div class="menu-list">
            <div class="menu-item tap-active"><i class="fa fa-star"></i><span>Mening obunalarim</span></div>
            <div class="menu-item tap-active"><i class="fa fa-user-shield"></i><span>Admin Panel (Aziz)</span></div>
            <div class="menu-item tap-active"><i class="fa fa-gear"></i><span>Sozlamalar</span></div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active tap-active" onclick="showPage('home', this)"><i class="fa fa-home"></i>Bosh sahifa</div>
        <div class="nav-item tap-active"><i class="fa fa-compass"></i>Katalog</div>
        <div class="nav-item tap-active" onclick="showPage('siz', this)">
            <div class="siz-btn-oval">
                <img src="https://via.placeholder.com/100?text=?" id="navAvatar" class="nav-avatar-img">
                <span style="font-weight:bold; color:white">Siz</span>
            </div>
        </div>
    </div>

    <script>
        // 1. Ma'lumotlar bazasi (Keyingi safar tezroq chiqarish uchun)
        const db = new Dexie("KinoDramaAutoDB");
        db.version(1).stores({ settings: "key, value" });

        // 2. Sahifa almashtirish
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        // 3. AVTOMATIK PROFILNI ANIQLASH
        async function initUser() {
            // A. Telegram Web App ichida bo'lsa (Eng tez va avtomatik yo'l)
            const tg = window.Telegram.WebApp;
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                const userData = {
                    name: user.first_name + (user.last_name ? " " + user.last_name : ""),
                    img: user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}&background=00ff73&color=000`
                };
                saveAndApply(userData);
                return;
            }

            // B. Brauzerda bo'lsa, avval saqlanganini tekshirish
            const saved = await db.settings.get('profile');
            if (saved) {
                applyUI(saved.value);
            }
        }

        // UI ni yangilash
        function applyUI(data) {
            document.getElementById('mainAvatar').src = data.img;
            document.getElementById('navAvatar').src = data.img;
            document.getElementById('tgName').innerText = data.name;
        }

        // Saqlash va UI ni yangilash
        async function saveAndApply(data) {
            await db.settings.put({ key: 'profile', value: data });
            applyUI(data);
        }

        // Sayt yuklanganda ishga tushirish
        window.onload = initUser;

        // Telegram interfeysini sozlash
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
