<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uzDrama - Official Web Portal</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #0b0b0b; --card: #181818; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 15px 5%; display: flex; justify-content: space-between;
            align-items: center; position: fixed; top: 0; width: 90%; z-index: 1000;
        }
        .logo { color: var(--red); font-size: 28px; font-weight: 800; text-decoration: none; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        
        .search-container { position: relative; }
        .search-container input {
            background: rgba(255,255,255,0.1); border: 1px solid #444; color: white;
            padding: 8px 15px 8px 35px; border-radius: 20px; outline: none; width: 150px; transition: 0.3s;
        }
        .search-container input:focus { width: 250px; border-color: var(--red); }
        .search-container i { position: absolute; left: 12px; top: 10px; color: #888; }

        /* HERO & CATEGORIES */
        .hero { height: 60vh; background: linear-gradient(to top, var(--bg), transparent), url('https://wallpaperaccess.com/full/6191119.jpg') center/cover; display: flex; align-items: flex-end; padding: 50px 5%; }
        .cat-btns { display: flex; gap: 10px; padding: 20px 5%; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #222; border: none; color: white; padding: 10px 25px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 500; }
        .cat-btn:hover { background: #333; }

        /* MOVIE GRID */
        .container { padding: 0 5%; }
        .section-title { font-size: 20px; margin: 20px 0; font-weight: bold; border-left: 4px solid var(--red); padding-left: 10px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .movie-card { background: var(--card); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .movie-card:hover { transform: translateY(-10px); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .movie-card .badge { position: absolute; top: 10px; right: 10px; background: gold; color: black; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .movie-card .free-badge { position: absolute; top: 10px; right: 10px; background: #00c853; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        .movie-card .info { padding: 10px; text-align: center; font-size: 14px; }

        /* ADMIN MODAL */
        .modal { display: none; position: fixed; top: 0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .admin-box { max-width: 500px; margin: 50px auto; background: #181818; padding: 30px; border-radius: 12px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 13px; }
        input, select { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--red); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        
        /* TABLE */
        .movie-list-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        .movie-list-table td { padding: 10px; border-bottom: 1px solid #333; }
        .del-btn { color: var(--red); cursor: pointer; background: none; border: none; }

        /* PLAYER */
        .player-overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #000; display: none; z-index: 3000; }
        .close-player { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; z-index: 10; }
        video { width: 100%; height: 100%; }

        .loading { display: none; text-align: center; color: gold; margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="location.reload()">uzDrama</a>
    <div class="nav-right">
        <div class="search-container">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="Qidiruv..." oninput="searchMovies()">
        </div>
        <button class="cat-btn" style="background: var(--red);" onclick="openAdmin()">Admin</button>
    </div>
</header>

<div id="homePage">
    <div class="hero">
        <div style="max-width: 600px;">
            <h1 style="font-size: 45px; margin: 0;">Meni Yashir</h1>
            <p style="color: #ccc;">Yangi fasl va barcha qismlar faqat bizda professional dublyajda.</p>
        </div>
    </div>

    <div class="cat-btns">
        <button class="cat-btn">Multseriallar</button>
        <button class="cat-btn">Anime</button>
        <button class="cat-btn">Teleko'rsatuv</button>
        <button class="cat-btn">Kinolar</button>
        <button class="cat-btn">Seriallar</button>
    </div>

    <div class="container">
        <div class="section-title">Yaqinda qo'shilganlar</div>
        <div id="movieGrid" class="movie-grid"></div>
    </div>
</div>

<!-- ADMIN PANEL LOGIN -->
<div id="loginModal" class="modal">
    <div class="admin-box">
        <h2 style="text-align:center">Admin Login</h2>
        <div class="input-group">
            <input type="text" id="admLogin" placeholder="Login">
        </div>
        <div class="input-group">
            <input type="password" id="admPass" placeholder="Parol">
        </div>
        <button class="btn-main" onclick="checkLogin()">KIRISH</button>
        <button class="btn-main" style="background:#444" onclick="closeModal()">YOPISH</button>
    </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDash" class="modal">
    <div class="admin-box" style="max-width: 700px;">
        <h2>Kino Boshqaruvi</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Kino Nomi:</label>
                <input type="text" id="mTitle">
            </div>
            <div class="input-group">
                <label>Turini tanlang:</label>
                <select id="mType">
                    <option value="free">Bepul</option>
                    <option value="paid">Pullik (PREMIUM)</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Poster (Rasm fayli):</label>
            <input type="file" id="mPoster" accept="image/*">
        </div>
        <div class="input-group">
            <label>Video (Fayl yuklang):</label>
            <input type="file" id="mVideo" accept="video/mp4">
        </div>
        <div id="loadStatus" class="loading">Yuklanmoqda, iltimos kuting...</div>
        <button class="btn-main" onclick="saveMovie()">SAYTGA JOYLASH</button>
        
        <h3>Mavjud videolar</h3>
        <table class="movie-list-table" id="adminTable"></table>
        <button class="btn-main" style="background:#444" onclick="closeModal()">CHIQISH</button>
    </div>
</div>

<!-- PLAYER -->
<div id="playerBox" class="player-overlay">
    <span class="close-player" onclick="closePlayer()">&times;</span>
    <video id="mainVid" controls controlsList="nodownload"></video>
</div>

<script>
    // 1. Database (IndexedDB)
    const db = new Dexie("uzDramaStorage");
    db.version(1).stores({ movies: "++id, title, type" });

    let allMovies = [];

    // 2. Auth
    function openAdmin() {
        if(sessionStorage.getItem('admin') === 'true') {
            showDashboard();
        } else {
            document.getElementById('loginModal').style.display = 'block';
        }
    }

    function checkLogin() {
        const l = document.getElementById('admLogin').value;
        const p = document.getElementById('admPass').value;
        if(l === "Aziz" && p === "Azizbek") {
            sessionStorage.setItem('admin', 'true');
            document.getElementById('loginModal').style.display = 'none';
            showDashboard();
        } else {
            alert("Login yoki Parol xato!");
        }
    }

    function closeModal() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    // 3. Movie Logic
    async function showDashboard() {
        document.getElementById('adminDash').style.display = 'block';
        const movies = await db.movies.toArray();
        const table = document.getElementById('adminTable');
        table.innerHTML = movies.map(m => `
            <tr>
                <td>${m.title} (${m.type})</td>
                <td align="right"><button class="del-btn" onclick="deleteMovie(${m.id})"><i class="fa fa-trash"></i></button></td>
            </tr>
        `).join('');
    }

    async function saveMovie() {
        const title = document.getElementById('mTitle').value;
        const type = document.getElementById('mType').value;
        const poster = document.getElementById('mPoster').files[0];
        const video = document.getElementById('mVideo').files[0];
        const status = document.getElementById('loadStatus');

        if(!title || !poster || !video) return alert("Hamma ma'lumotni kiriting!");

        status.style.display = "block";
        try {
            await db.movies.add({ title, type, poster, video });
            status.style.display = "none";
            alert("Kino qo'shildi!");
            location.reload();
        } catch(e) {
            alert("Xatolik! Joy yetarli emas.");
            status.style.display = "none";
        }
    }

    async function deleteMovie(id) {
        if(confirm("Ushbu kinoni o'chirmoqchimisiz?")) {
            await db.movies.delete(id);
            showDashboard();
            loadHome();
        }
    }

    // 4. UI Rendering
    async function loadHome() {
        allMovies = await db.movies.toArray();
        renderGrid(allMovies);
    }

    function renderGrid(data) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = data.map(m => `
            <div class="movie-card" onclick="playMovie(${m.id})">
                ${m.type === 'paid' ? '<div class="badge">PREMIUM</div>' : '<div class="free-badge">FREE</div>'}
                <img src="${URL.createObjectURL(m.poster)}">
                <div class="info">
                    <h3>${m.title}</h3>
                </div>
            </div>
        `).join('');
        if(data.length === 0) grid.innerHTML = "<p>Hozircha kinolar yo'q.</p>";
    }

    function searchMovies() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allMovies.filter(m => m.title.toLowerCase().includes(q));
        renderGrid(filtered);
    }

    // 5. Player
    async function playMovie(id) {
        const movie = await db.movies.get(id);
        if(movie.type === 'paid') {
            alert("Bu premium kino! Ko'rish uchun obuna bo'ling (Demo)");
        }
        const playerBox = document.getElementById('playerBox');
        const vid = document.getElementById('mainVid');
        vid.src = URL.createObjectURL(movie.video);
        playerBox.style.display = 'block';
        vid.play();
    }

    function closePlayer() {
        const vid = document.getElementById('mainVid');
        vid.pause();
        vid.src = "";
        document.getElementById('playerBox').style.display = 'none';
    }

    loadHome();
</script>
</body>
</html>
