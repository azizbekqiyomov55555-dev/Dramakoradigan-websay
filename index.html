<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Portal</title>
    
    <!-- Kutubxonalar -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #0b0b0b;
            --card-bg: #1c1c1e;
            --accent: #00ff73;
            --gray-text: #8e8e93;
            --border: #2c2c2e;
            --tab-bg: #2a2a2a;
            --red-text: #ff453a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            margin: 0; padding: 0;
            overflow: hidden;
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 0.5px solid var(--border); z-index: 1000;
        }
        .nav-item { text-align: center; color: var(--gray-text); font-size: 11px; cursor: pointer; flex: 1; text-decoration: none; -webkit-tap-highlight-color: transparent; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        
        /* Siz Oval Tugmasi (Aynan rasmdek) */
        .siz-btn-wrapper {
            display: inline-flex; align-items: center; gap: 10px;
            background: #242424; padding: 4px 16px 4px 4px;
            border-radius: 30px; border: 1.5px solid #333; transition: 0.3s;
        }
        .nav-item.active .siz-btn-wrapper { border-color: #555; background: #2a2a2a; }
        
        .tg-nav-avatar { 
            width: 28px; height: 28px; 
            border-radius: 50%; object-fit: cover; 
            background: #111; border: 1px solid #444;
        }

        /* --- PAGES --- */
        .page { display: none; height: calc(100vh - 75px); overflow-y: auto; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- BOSH SAHIFA (QIMIRLAB TURADIGAN) --- */
        .swiper { width: 100%; height: 100%; }
        .swiper-slide {
            position: relative; width: 100%; height: 100%;
            background-size: cover; background-position: center;
        }
        .slide-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, var(--bg) 10%, transparent);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 40px 20px 100px; box-sizing: border-box;
            text-align: center;
        }
        .m-title { font-size: 40px; font-weight: 900; color: #ff3b30; text-transform: uppercase; margin: 0; }
        .m-tags { display: flex; justify-content: center; gap: 10px; margin: 15px 0; color: #ccc; font-size: 14px; }

        /* --- SIZ SAHIFASI --- */
        .status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px 5%; }
        .status-box { background: var(--card-bg); padding: 18px; border-radius: 18px; position: relative; }
        .menu-list { background: var(--card-bg); margin: 15px 5%; border-radius: 18px; overflow: hidden; }
        .menu-item { display: flex; align-items: center; padding: 18px; border-bottom: 0.5px solid #2c2c2e; cursor: pointer; }
        .menu-item i.icon { width: 35px; font-size: 18px; }
        .menu-item span { flex: 1; font-size: 16px; }

        /* --- ADMIN --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .admin-card { background: #181818; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; background: #222; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn-save { width: 100%; background: white; color: black; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }

        /* --- PLAYER --- */
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; }
        video { width: 100%; height: 100%; }
        .close-player { position: absolute; top: 20px; left: 20px; font-size: 30px; color: white; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="sliderWrapper"></div>
        </div>
    </div>

    <!-- MENING PAGE -->
    <div id="mening" class="page">
        <div style="display:flex; justify-content:center; gap:10px; padding:20px;">
            <div style="background:#2c2c2e; padding:10px 20px; border-radius:20px;">Tanlangan</div>
            <div style="background:#2c2c2e; padding:10px 20px; border-radius:20px;">Tarix</div>
        </div>
        <div style="text-align:center; margin-top:50px; color:var(--gray-text);">
            <i class="fa fa-bookmark" style="font-size:50px; margin-bottom:10px;"></i>
            <p>Hech narsa saqlanmagan</p>
        </div>
    </div>

    <!-- SIZ PAGE -->
    <div id="siz" class="page">
        <div class="status-row">
            <div class="status-box"><span style="color:var(--red-text)">Premium faol emas</span><br><strong>Obunalar ></strong></div>
            <div class="status-box"><span style="color:var(--gray-text)">Hisob: 0 so'm</span><br><strong>To'ldirish ></strong></div>
        </div>

        <div class="menu-list">
            <div class="menu-item"><i class="fa fa-play icon"></i><span>Obuna</span><i class="fa fa-chevron-right"></i></div>
            <div class="menu-item"><i class="fa fa-download icon"></i><span>Yuklanganlar</span><i class="fa fa-chevron-right"></i></div>
        </div>

        <div class="menu-list">
            <div class="menu-item"><i class="fa fa-qrcode icon"></i><span>QR skanerlash</span><i class="fa fa-chevron-right"></i></div>
            <div class="menu-item" onclick="openAdmin()"><i class="fa fa-gear icon"></i><span>Sozlamalar</span><i class="fa fa-chevron-right"></i></div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fa fa-house"></i>Bosh sahifa</div>
        <div class="nav-item" onclick="alert('Tez kunda...')"><i class="fa fa-search"></i>Katalog</div>
        <div class="nav-item" onclick="showPage('mening', this)"><i class="fa fa-bookmark"></i>Mening</div>
        <div class="nav-item" onclick="showPage('siz', this)">
            <div class="siz-btn-wrapper">
                <!-- TELEGRAM PUROFIL RASMI SHU YERDA CHIQADI -->
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aziz" class="tg-nav-avatar" id="navAvatar">
                <span style="font-size:15px; font-weight:500;">Siz</span>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="modal">
        <h2 style="text-align: center;">Admin Panel</h2>
        
        <div id="loginForm">
            <input type="text" id="admLogin" placeholder="Login (Aziz)">
            <input type="password" id="admPass" placeholder="Parol (Azizbek)">
            <button class="btn-save" onclick="login()">KIRISH</button>
        </div>

        <div id="uploadForm" style="display: none;">
            <div class="admin-card">
                <h3>Profil Rasmini O'zgartirish</h3>
                <input type="file" accept="image/*" onchange="updateAvatar(this)">
            </div>

            <div class="admin-card">
                <h3>Kino Yuklash</h3>
                <input type="text" id="mTitle" placeholder="Kino nomi">
                <input type="text" id="mGenre" placeholder="Janrlar (Komediya, Drama)">
                <label>Poster:</label><input type="file" id="mPoster" accept="image/*">
                <label>Video:</label><input type="file" id="mVideo" accept="video/mp4">
                <button class="btn-save" onclick="saveMovie()">SAYTGA JOYLASHTIRISH</button>
            </div>
            <div id="delList"></div>
        </div>
        
        <button class="btn-save" style="background:#333; color:white; margin-top:15px;" onclick="closeAdmin()">YOPISH</button>
    </div>

    <!-- PLAYER -->
    <div id="player">
        <i class="fa fa-arrow-left close-player" onclick="closePlayer()"></i>
        <video id="mainVideo" controls></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Dexie DB Sozlash
        const db = new Dexie("FrameUltraDB");
        db.version(1).stores({ movies: "++id, title", settings: "key, value" });

        // Swiper Slayder Sozlash
        const swiper = new Swiper('.mySwiper', {
            loop: true,
            autoplay: { delay: 4000 },
            effect: 'fade'
        });

        // Sahifa almashtirish
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        // Admin Auth
        function openAdmin() { document.getElementById('adminPanel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        function login() {
            if(document.getElementById('admLogin').value === 'Aziz' && document.getElementById('admPass').value === 'Azizbek') {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('uploadForm').style.display = 'block';
                renderDelList();
            } else { alert('Xato!'); }
        }

        // Profil rasmini (Avatar) yangilash va saqlash
        async function updateAvatar(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result;
                document.getElementById('navAvatar').src = base64;
                await db.settings.put({ key: 'avatar', value: base64 });
                alert("Profil rasmi yangilandi!");
            };
            reader.readAsDataURL(file);
        }

        // Kinoni saqlash
        async function saveMovie() {
            const title = document.getElementById('mTitle').value;
            const genre = document.getElementById('mGenre').value;
            const poster = document.getElementById('mPoster').files[0];
            const video = document.getElementById('mVideo').files[0];
            if(!title || !poster || !video) return alert('Hamma ma\'lumotni kiritng!');

            await db.movies.add({ title, genre, poster, video });
            alert('Muvaffaqiyatli yuklandi!');
            location.reload();
        }

        // Ma'lumotlarni yuklash
        async function loadContent() {
            // Saqlangan profil rasmini yuklash
            const avatarData = await db.settings.get('avatar');
            if(avatarData) document.getElementById('navAvatar').src = avatarData.value;

            // Kinolarni slayderga yuklash
            const movies = await db.movies.toArray();
            const wrapper = document.getElementById('sliderWrapper');
            movies.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                wrapper.innerHTML += `
                    <div class="swiper-slide" style="background-image: url('${img}')" onclick="playMovie(${m.id})">
                        <div class="slide-overlay">
                            <div class="m-tags"><span>${m.genre || 'Janr'}</span> | <span>18+</span></div>
                            <h1 class="m-title">${m.title}</h1>
                            <div style="margin-top:20px; font-weight:bold; letter-spacing:1px; color:var(--accent)">TOMOSHA QILISH</div>
                        </div>
                    </div>`;
            });
            swiper.update();
        }

        async function renderDelList() {
            const movies = await db.movies.toArray();
            document.getElementById('delList').innerHTML = movies.map(m => `
                <div style="display:flex; justify-content:space-between; background:#222; padding:12px; border-radius:10px; margin-bottom:8px;">
                    <span>${m.title}</span> <i class="fa fa-trash" style="color:red; cursor:pointer" onclick="deleteMovie(${m.id})"></i>
                </div>`).join('');
        }

        async function deleteMovie(id) {
            await db.movies.delete(id);
            renderDelList();
        }

        // Video Player
        function playMovie(id) {
            db.movies.get(id).then(m => {
                document.getElementById('player').style.display = 'block';
                const v = document.getElementById('mainVideo');
                v.src = URL.createObjectURL(m.video);
                v.play();
            });
        }

        function closePlayer() {
            const v = document.getElementById('mainVideo');
            v.pause();
            v.src = "";
            document.getElementById('player').style.display = 'none';
        }

        loadContent();
    </script>
</body>
</html>
