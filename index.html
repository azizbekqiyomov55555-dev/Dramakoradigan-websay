<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PRO</title>
    
    <!-- Kutubxonalar -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #000000;
            --accent: #00ff73;
            --card-bg: #111;
            --border: #222;
            --gray: #888;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* --- ANIMATSIYALAR --- */
        .tap-active { transition: transform 0.1s ease; cursor: pointer; }
        .tap-active:active { transform: scale(0.95); opacity: 0.8; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { text-align: center; color: var(--gray); font-size: 11px; flex: 1; transition: 0.3s; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        .siz-btn-oval {
            display: inline-flex; align-items: center; gap: 8px;
            background: #1a1a1a; padding: 4px 14px 4px 4px;
            border-radius: 30px; border: 1.5px solid #333;
        }
        .nav-item.active .siz-btn-oval { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 255, 115, 0.3); }
        .nav-avatar-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #222; }

        /* --- PAGES --- */
        .page { display: none; padding-top: 10px; animation: pageFade 0.4s ease; }
        .page.active { display: block; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- SLAYDER (AVTOMATIK) --- */
        .hero-swiper { width: 100%; height: 420px; padding: 10px 0; }
        .swiper-slide { 
            width: 85% !important; height: 380px; border-radius: 25px; 
            overflow: hidden; position: relative; transform: scale(0.92); transition: 0.4s;
        }
        .swiper-slide-active { transform: scale(1); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1) 15%, transparent 70%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; box-sizing: border-box; text-align: center;
        }
        .hero-title { font-size: 26px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .swiper-pagination-bullet-active { background: var(--accent) !important; width: 20px !important; border-radius: 5px; }

        /* --- KINO LIST --- */
        .section-title { padding: 20px 5% 10px; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ""; width: 4px; height: 20px; background: var(--accent); border-radius: 10px; }
        .continue-list { display: flex; gap: 15px; padding: 0 5% 20px; overflow-x: auto; scrollbar-width: none; }
        .movie-card { width: 180px; flex-shrink: 0; }
        .movie-card img { width: 100%; height: 105px; border-radius: 15px; object-fit: cover; border: 1px solid #222; }

        /* --- SIZ SAHIFASI --- */
        .profile-header { padding: 30px 5%; display: flex; align-items: center; gap: 20px; }
        .main-avatar-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; background: #222; }
        
        .status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 5%; }
        .status-box { background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
        
        .menu-list { background: var(--card-bg); margin: 20px 5%; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .menu-item { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid #222; }
        .menu-item i { width: 30px; color: var(--accent); font-size: 18px; }

        /* --- ADMIN --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .admin-card { background: #0a0a0a; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; background: #161616; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--accent); color: black; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; }

        /* PLAYER */
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; }
        video { width: 100%; height: 100%; }
        .close-player { position: absolute; top: 30px; left: 20px; font-size: 24px; color: white; z-index: 10; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 50%; }
    </style>
</head>
<body>

    <!-- BOSH SAHIFA -->
    <div id="home" class="page active">
        <div class="swiper hero-swiper">
            <div class="swiper-wrapper" id="heroList"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="section-title">Yangi qo'shilganlar</div>
        <div class="continue-list" id="normalList"></div>
    </div>

    <!-- SIZ (PROFIL) -->
    <div id="siz" class="page">
        <div class="profile-header">
            <!-- ASOSIY PROFIL RASMI -->
            <img src="https://via.placeholder.com/100?text=User" id="mainAvatar" class="main-avatar-img">
            <div>
                <h2 id="tgName" style="margin:0; font-size: 24px;">Mehmon</h2>
                <div id="tg-widget-container" style="margin-top:10px;">
                    <!-- Agar login qilmagan bo'lsa, widget chiqadi -->
                    <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="SizningBotingiz" data-size="small" data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
                </div>
            </div>
        </div>

        <div class="status-row">
            <div class="status-box tap-active"><span style="color:#ff453a; font-size:12px; font-weight:bold;">PREMIUM</span><br><strong>Sotib olish ></strong></div>
            <div class="status-box tap-active"><span style="color:var(--gray); font-size:12px;">HAMYON</span><br><strong>0 so'm ></strong></div>
        </div>

        <div class="menu-list">
            <div class="menu-item tap-active"><i class="fa fa-play-circle"></i><span>Obunalarim</span></div>
            <div class="menu-item tap-active" onclick="openAdmin()"><i class="fa fa-user-shield"></i><span>Admin Panel (Aziz)</span></div>
            <div class="menu-item tap-active"><i class="fa fa-gear"></i><span>Sozlamalar</span></div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active tap-active" onclick="showPage('home', this)"><i class="fa fa-home"></i>Bosh sahifa</div>
        <div class="nav-item tap-active"><i class="fa fa-compass"></i>Katalog</div>
        <div class="nav-item tap-active" onclick="showPage('siz', this)">
            <div class="siz-btn-oval">
                <!-- BOTTOM NAV KICHIK RASMI -->
                <img src="https://via.placeholder.com/100?text=?" id="navAvatar" class="nav-avatar-img">
                <span style="font-weight:bold; color:white">Siz</span>
            </div>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="adminPanel" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Admin Panel</h2>
            <i class="fa fa-times-circle" style="font-size:30px; color:#555;" onclick="closeAdmin()"></i>
        </div>
        <div id="loginForm">
            <input type="text" id="admLogin" placeholder="Login">
            <input type="password" id="admPass" placeholder="Parol">
            <button class="btn-save" onclick="login()">KIRISH</button>
        </div>
        <div id="uploadForm" style="display: none;">
            <div class="admin-card">
                <h3 style="color:var(--accent)">Yangi kino qo'shish</h3>
                <input type="text" id="kTitle" placeholder="Kino nomi">
                <label>Poster:</label><input type="file" id="kPoster" accept="image/*">
                <label>Video:</label><input type="file" id="kVideo" accept="video/*">
                <button class="btn-save" onclick="saveKino()">SAQLASH</button>
            </div>
            <div id="delList"></div>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="player">
        <i class="fa fa-chevron-left close-player tap-active" onclick="closePlayer()"></i>
        <video id="mainVideo" controls playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // 1. MA'LUMOTLAR BAZASI (Dexie)
        const db = new Dexie("KinoDramaUltimateDB");
        db.version(1).stores({ 
            movies: "++id, title, category", 
            settings: "key, value" 
        });

        // 2. SLAYDER (Avtomatik o'tish)
        let swiper = new Swiper('.hero-swiper', {
            slidesPerView: 'auto', centeredSlides: true, loop: true, spaceBetween: -15,
            autoplay: { delay: 2500, disableOnInteraction: false },
            pagination: { el: '.swiper-pagination', clickable: true }
        });

        // 3. SAHIFA ALMASHINUVI
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        // 4. TELEGRAM AUTH (AVTOMATIK RASM OLISH)
        async function onTelegramAuth(user) {
            // Ma'lumotlarni bazaga saqlaymiz (keyingi safar avtomatik chiqishi uchun)
            await db.settings.put({ key: 'user_profile', value: user });
            updateUI(user);
        }

        function updateUI(user) {
            if (!user) return;
            const photo = user.photo_url || "https://via.placeholder.com/100?text=User";
            const name = user.first_name || "Foydalanuvchi";

            // UI elementlarini yangilash
            document.getElementById('mainAvatar').src = photo;
            document.getElementById('navAvatar').src = photo;
            document.getElementById('tgName').innerText = name;
            
            // Login widgetni yashirish
            const widget = document.getElementById('tg-widget-container');
            if (widget) widget.style.display = 'none';
        }

        // 5. ADMIN LOGIC
        function openAdmin() { document.getElementById('adminPanel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        
        function login() {
            if(document.getElementById('admLogin').value === 'Aziz' && document.getElementById('admPass').value === 'Azizbek') {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('uploadForm').style.display = 'block';
                renderDelList();
            } else { alert('Xato!'); }
        }

        async function saveKino() {
            const title = document.getElementById('kTitle').value;
            const poster = document.getElementById('kPoster').files[0];
            const video = document.getElementById('kVideo').files[0];
            if(!title || !poster || !video) return alert('Barcha fayllarni tanlang!');
            
            await db.movies.add({ title, poster, video, category: 'all' });
            alert('Kino qo\'shildi!');
            
            // Panel yopilmaydi, ro'yxat yangilanadi
            renderDelList();
            loadContent();
        }

        // 6. KONTENTNI YUKLASH (VA BAZADAN PROFILNI OLISH)
        async function loadContent() {
            // Avtomatik profilni tekshirish
            const savedUser = await db.settings.get('user_profile');
            if (savedUser) {
                updateUI(savedUser.value);
            }

            const movies = await db.movies.toArray();
            const heroList = document.getElementById('heroList');
            const normalList = document.getElementById('normalList');
            
            heroList.innerHTML = '';
            normalList.innerHTML = '';

            movies.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                // Slayderga
                heroList.innerHTML += `<div class="swiper-slide tap-active" onclick="playMovie(${m.id})"><img src="${img}" class="hero-img"><div class="hero-overlay"><h1 class="hero-title">${m.title}</h1></div></div>`;
                // Pastki ro'yxatga
                normalList.innerHTML += `<div class="movie-card tap-active" onclick="playMovie(${m.id})"><img src="${img}"><div style="margin-top:8px; font-weight:bold; font-size:14px;">${m.title}</div></div>`;
            });
            swiper.update();
        }

        async function renderDelList() {
            const movies = await db.movies.toArray();
            document.getElementById('delList').innerHTML = '<h4>O\'chirish:</h4>' + movies.map(m => `<div style="padding:10px; background:#222; margin-top:5px; border-radius:10px; display:flex; justify-content:space-between;">${m.title} <i class="fa fa-trash" style="color:red" onclick="deleteMovie(${m.id})"></i></div>`).join('');
        }

        async function deleteMovie(id) {
            await db.movies.delete(id);
            renderDelList();
            loadContent();
        }

        // 7. PLAYER
        function playMovie(id) {
            db.movies.get(id).then(m => {
                document.getElementById('player').style.display = 'block';
                const v = document.getElementById('mainVideo');
                v.src = URL.createObjectURL(m.video);
                v.play();
            });
        }

        function closePlayer() { 
            document.getElementById('mainVideo').pause(); 
            document.getElementById('player').style.display = 'none'; 
        }

        // Sahifa ochilishi bilan kontentni yuklash
        window.onload = loadContent;
    </script>
</body>
</html>
