<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PREMIUM</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { 
            --bg: #000; 
            --accent: #00ff73; 
            --card: #121212; 
            --border: #222;
        }

        body { 
            background: var(--bg); color: white; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding-bottom: 90px; overflow-x: hidden;
        }

        .tap-active { transition: transform 0.1s ease; cursor: pointer; }
        .tap-active:active { transform: scale(0.95); opacity: 0.8; }

        /* NAV BAR */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid var(--border); z-index: 1000; 
        }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }

        /* SEARCH ANIMATION */
        .movie-card { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* MOVIE DETAIL (USER IMAGE STYLE) */
        .detail-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .detail-hero { position: relative; width: 100%; height: 500px; }
        .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
        .detail-overlay { position: absolute; bottom: 0; width: 100%; padding: 30px 20px; background: linear-gradient(0deg, #000 20%, transparent); box-sizing: border-box; }
        
        /* GREEN PART BUTTONS */
        .part-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .part-btn { 
            background: #1a1a1a; border: 1.5px solid #333; color: white; padding: 12px; 
            border-radius: 12px; font-weight: bold; text-align: center; font-size: 13px;
        }
        .part-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,115,0.4); }

        .btn-main { background: var(--accent); color: #000; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 18px; border: none; margin-top: 10px; }

        /* TRANSACTIONS */
        .trx-card { background: #111; padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); margin-bottom: 10px; font-size: 13px; }

        /* ADMIN & MODALS */
        .modal { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2500; overflow-y: auto; }
        .modal-content { background: #111; border-radius: 30px; padding: 25px; margin: 50px 15px; border: 1px solid #222; }
        input, select { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-admin { background: var(--accent); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: bold; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- ASOSIY SAHIFA -->
    <div id="home" class="page active">
        <div class="swiper hero-swiper" style="height:350px; margin-bottom:20px;">
            <div class="swiper-wrapper" id="heroList"></div>
        </div>
        <div style="font-weight: 900; font-size: 20px; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px;">Kinolar</div>
        <div class="movie-grid" id="normalList" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:0 15px;"></div>
    </div>

    <!-- QIDIRUV -->
    <div id="search" class="page" style="padding:20px;">
        <input type="text" id="searchInput" placeholder="Kino nomini yozing..." oninput="searchMovie()" style="margin-top:10px; font-size:16px;">
        <div class="movie-grid" id="searchResult" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>

    <!-- MENING SAHIFAM -->
    <div id="mening" class="page" style="padding:20px;">
        <h3 style="border-left:4px solid var(--accent); padding-left:10px;">Oxirgi ko'rilganlar</h3>
        <div id="historyList" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:20px;"></div>

        <h3 style="border-left:4px solid var(--accent); padding-left:10px; margin-top:30px;">To'lovlar tarixi</h3>
        <div id="trxList"></div>
    </div>

    <!-- PROFIL (SIZ) -->
    <div id="siz" class="page" style="padding:20px;">
        <div style="display: flex; align-items: center; gap: 20px; padding: 20px 0;">
            <img src="" id="mainAvatar" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--accent);">
            <div>
                <h2 id="tgName" style="margin:0;">Foydalanuvchi</h2>
                <div id="premiumStatus" style="color:var(--accent); font-weight:bold; font-size:14px; margin-top:5px;"></div>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="status-card tap-active" onclick="openPremiumModal()" style="background:#111; padding:20px; border-radius:20px;">
                <span style="color:red; font-size:11px; font-weight:900;">PREMIUM</span><br><strong>Sotib olish</strong>
            </div>
            <div class="status-card tap-active" onclick="openDepositModal()" style="background:#111; padding:20px; border-radius:20px;">
                <span style="color:#888; font-size:11px; font-weight:900;">HISOB</span><br><strong id="userBalance">0 so'm</strong>
            </div>
        </div>
        <div style="margin-top:20px; background:#111; border-radius:20px; overflow:hidden;">
            <div class="tap-active" style="padding:20px; border-bottom:1px solid #222;" onclick="showAdminLogin()"><i class="fa fa-lock" style="color:var(--accent); margin-right:10px;"></i> Admin Panel</div>
        </div>
    </div>

    <!-- KINO DETAIL -->
    <div id="detailPage" class="detail-page">
        <i class="fa fa-arrow-left" onclick="closeDetail()" style="position:fixed; top:25px; left:20px; z-index:2100; font-size:22px;"></i>
        <div id="detailContent"></div>
    </div>

    <!-- PLAYER -->
    <div id="player" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000;">
        <i class="fa fa-arrow-left" onclick="closePlayer()" style="position:absolute; top:25px; left:20px; z-index:3010; font-size:22px;"></i>
        <video id="mainVideo" style="width:100%; height:100%;" playsinline></video>
        <div style="position:absolute; bottom:50px; width:100%; display:flex; justify-content:center; gap:50px;">
            <i class="fa fa-backward-step" style="font-size:30px;" onclick="skip(-10)"></i>
            <i id="pBtn" class="fa fa-pause" style="font-size:30px;" onclick="togglePlay()"></i>
            <i class="fa fa-forward-step" style="font-size:30px;" onclick="skip(10)"></i>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="modal">
        <div style="padding:20px;">
            <h2 style="display:flex; justify-content:space-between;">Admin Panel <span onclick="closeModal('adminPanel')">&times;</span></h2>
            
            <div class="modal-content" style="margin:0 0 20px 0;">
                <h3>Premium Tarif Qo'shish</h3>
                <input type="text" id="pName" placeholder="Tarif nomi (Masalan: 1 kunlik)">
                <input type="number" id="pTime" placeholder="Vaqt miqdori">
                <select id="pUnit">
                    <option value="min">Minut</option>
                    <option value="hour">Soat</option>
                    <option value="day">Kun</option>
                </select>
                <input type="number" id="pPrice" placeholder="Narxi (so'm)">
                <button class="btn-admin" onclick="addPlan()">TARIFNI SAQLASH</button>
            </div>

            <div class="modal-content" style="margin:0;">
                <h3>Yangi Kino</h3>
                <input type="text" id="kTitle" placeholder="Kino nomi">
                <input type="number" id="kPrice" placeholder="Narxi (0=tekin)">
                <small>Poster:</small><input type="file" id="kPoster" accept="image/*">
                <div id="vContainer">
                    <div style="padding:10px; border:1px dashed #444; margin-bottom:10px;">
                        <small>1-qism:</small><input type="file" class="vFiles" accept="video/*">
                    </div>
                </div>
                <button class="btn-admin" style="background:#333; color:#fff;" onclick="addVField()">+ Qism qo'shish</button>
                <button class="btn-admin" onclick="saveKino()">KINONI YUKLASH</button>
            </div>
            
            <div id="adminDelList" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- MODALLAR (LOGIN, DEPOSIT, PREMIUM) -->
    <div id="loginModal" class="modal"><div class="modal-content" style="max-width:300px; margin:150px auto;"><h3>Admin</h3><input type="password" id="admPass"><button class="btn-admin" onclick="checkAdmin()">KIRISH</button></div></div>
    
    <div id="depositModal" class="modal"><div class="modal-content">
        <h2>To'ldirish</h2>
        <div id="cardBox" style="background:linear-gradient(90deg,#00ff73,#008f41); padding:20px; border-radius:15px; color:#000; font-weight:900; margin-bottom:15px;" onclick="copyCard()">8600 0000 0000 0000</div>
        <input type="number" id="dSum" placeholder="Summa">
        <input type="file" id="dImg" accept="image/*">
        <button class="btn-admin" onclick="sendToBot()">BOTGA YUBORISH</button>
        <button class="btn-admin" style="background:none; color:#fff;" onclick="closeModal('depositModal')">YOPISH</button>
    </div></div>

    <div id="premModal" class="modal"><div class="modal-content"><h2>Premium Tariflar</h2><div id="plansList"></div><button class="btn-admin" style="background:none; color:#fff;" onclick="closeModal('premModal')">YOPISH</button></div></div>

    <!-- NAV BAR -->
    <div class="bottom-nav">
        <div class="nav-item active tap-active" onclick="showPage('home', this)"><i class="fa fa-home"></i><br>Asosiy</div>
        <div class="nav-item tap-active" onclick="showPage('search', this)"><i class="fa fa-search"></i><br>Qidiruv</div>
        <div class="nav-item tap-active" onclick="showPage('mening', this)"><i class="fa fa-bookmark"></i><br>Mening</div>
        <div class="nav-item tap-active" onclick="showPage('siz', this)"><i class="fa fa-user"></i><br>Siz</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const db = new Dexie("KinoDrama_Ultimate_DB");
        db.version(1).stores({
            movies: "++id, title, price",
            profile: "key, value",
            settings: "key, value",
            plans: "++id, name, price",
            history: "++id, mId, time",
            trxs: "++id, type, amount, date"
        });

        const tg = window.Telegram.WebApp;
        let selectedPart = 0;

        async function init() {
            if (tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                await db.profile.put({ key: 'user_info', value: { name: u.first_name, img: u.photo_url || "https://ui-avatars.com/api/?name="+u.first_name, id: u.id } });
            }
            if(!(await db.profile.get('balance'))) await db.profile.put({key:'balance', value: 0});
            if(!(await db.profile.get('expiry'))) await db.profile.put({key:'expiry', value: 0});
            
            loadUI(); loadContent(); loadMening(); tg.expand();
        }

        async function loadUI() {
            const info = await db.profile.get('user_info');
            const bal = await db.profile.get('balance');
            const exp = await db.profile.get('expiry');

            if(info) {
                document.getElementById('mainAvatar').src = info.value.img;
                document.getElementById('tgName').innerText = info.value.name;
            }
            document.getElementById('userBalance').innerText = (bal.value || 0).toLocaleString() + " so'm";

            const now = Date.now();
            if(exp.value > now) {
                let diff = exp.value - now;
                let d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000);
                document.getElementById('premiumStatus').innerText = `Premium: FAOL (${d}k ${h}s ${m}m)`;
            } else { document.getElementById('premiumStatus').innerText = "Premium: Faol emas ❌"; }
        }

        // MOVIE DETAIL & PARTS
        async function openMovie(id) {
            const m = await db.movies.get(id);
            const poster = URL.createObjectURL(m.poster);
            selectedPart = 0;

            let partBtns = m.videos.map((v, i) => `
                <div class="part-btn tap-active ${i===0?'active':''}" id="pbtn-${i}" onclick="selectPart(${i})">
                    ${i+1}-qism
                </div>
            `).join('');

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-hero">
                    <img src="${poster}">
                    <div class="detail-overlay">
                        <h1 style="font-size:45px; margin:0; text-transform:uppercase; font-weight:900;">${m.title}</h1>
                        <div style="margin:10px 0; color:#ccc;">Turkiya, 18+ • Drama</div>
                        <div class="part-grid">${partBtns}</div>
                        <button class="btn-main tap-active" onclick="checkAndPlay(${m.id})">
                            <i class="fa fa-play"></i> KO'RISH
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('detailPage').style.display = 'block';
        }

        function selectPart(idx) {
            document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`pbtn-${idx}`).classList.add('active');
            selectedPart = idx;
        }

        async function checkAndPlay(id) {
            const m = await db.movies.get(id);
            const bal = await db.profile.get('balance');
            const exp = await db.profile.get('expiry');

            if(m.price == 0 || exp.value > Date.now()) {
                startPlayer(m.videos[selectedPart], id);
            } else {
                if(confirm(`Kino pullik: ${m.price} so'm. Sotib olasizmi?`)) {
                    if(bal.value >= m.price) {
                        await db.profile.put({key:'balance', value: bal.value - m.price});
                        await db.trxs.add({type: 'Kino: ' + m.title, amount: -m.price, date: new Date().toLocaleString()});
                        loadUI(); startPlayer(m.videos[selectedPart], id);
                    } else { alert("Mablag' kam!"); openDepositModal(); }
                }
            }
        }

        function startPlayer(blob, id) {
            const v = document.getElementById('mainVideo');
            v.src = URL.createObjectURL(blob);
            document.getElementById('player').style.display = 'block';
            v.play();
            db.history.add({mId: id, time: Date.now()});
            if(v.requestFullscreen) v.requestFullscreen();
        }

        // SEARCH WITH ANIMATION
        async function searchMovie() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const res = document.getElementById('searchResult');
            res.innerHTML = '';
            const all = await db.movies.toArray();
            const filtered = all.filter(m => m.title.toLowerCase().includes(val));
            
            filtered.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                res.innerHTML += `<div class="movie-card tap-active" onclick="openMovie(${m.id})"><img src="${img}" style="width:100%; height:150px; border-radius:15px; object-fit:cover;"><div style="font-weight:bold; margin-top:5px;">${m.title}</div></div>`;
            });
        }

        // MENING (HISTORY & TRX)
        async function loadMening() {
            const hist = await db.history.orderBy('time').reverse().limit(5).toArray();
            const hList = document.getElementById('historyList');
            hList.innerHTML = '';
            for(let h of hist) {
                const m = await db.movies.get(h.mId);
                if(m) {
                    const img = URL.createObjectURL(m.poster);
                    hList.innerHTML += `<div onclick="openMovie(${m.id})" style="min-width:120px;"><img src="${img}" style="width:120px; height:80px; border-radius:12px; object-fit:cover;"><div style="font-size:11px; font-weight:bold; white-space:nowrap; overflow:hidden;">${m.title}</div></div>`;
                }
            }

            const trxs = await db.trxs.orderBy('id').reverse().toArray();
            document.getElementById('trxList').innerHTML = trxs.map(t => `
                <div class="trx-card">
                    <div style="display:flex; justify-content:space-between;"><b>${t.type}</b> <span style="color:${t.amount>0?'#00ff73':'#ff453a'}">${t.amount>0?'+':''}${t.amount} so'm</span></div>
                    <div style="font-size:10px; color:#888; margin-top:5px;">${t.date}</div>
                </div>
            `).join('') || "<small>Hozircha tranzaksiyalar yo'q</small>";
        }

        // BOT & PREMIUM
        async function sendToBot() {
            const sum = document.getElementById('dSum').value;
            const img = document.getElementById('dImg').files[0];
            const info = await db.profile.get('user_info');
            if(!sum || !img) return alert("To'liq to'ldiring!");

            const msg = `💰 TO'LOV!\n👤: ${info.value.name}\n🆔: ${info.value.id}\n💵: ${sum} so'm`;
            const kb = { inline_keyboard: [[
                { text: "✅ Tasdiqlash", callback_data: `add_${info.value.id}_${sum}` },
                { text: "❌ Bekor qilish", callback_data: `cancel` }
            ]]};

            // Eslatma: Haqiqiy bot tokeni kerak
            const tok = "SIZNING_BOT_TOKENINGIZ"; 
            const aid = "ADMIN_CHAT_ID";

            const fd = new FormData();
            fd.append('chat_id', aid); fd.append('photo', img); fd.append('caption', msg); fd.append('reply_markup', JSON.stringify(kb));
            
            fetch(`https://api.telegram.org/bot${tok}/sendPhoto`, { method: 'POST', body: fd });
            alert("Botga yuborildi! Admin tasdiqlashi bilan balansga tushadi.");
            
            // Demo uchun balansga qo'shish (Aslida bot qiladi)
            let b = await db.profile.get('balance');
            await db.profile.put({key:'balance', value: b.value + parseInt(sum)});
            await db.trxs.add({type: "Hisob to'ldirildi", amount: parseInt(sum), date: new Date().toLocaleString()});
            closeModal('depositModal'); loadUI(); loadMening();
        }

        async function openPremiumModal() {
            const plans = await db.plans.toArray();
            document.getElementById('plansList').innerHTML = plans.map(p => `
                <div class="trx-card tap-active" onclick="buyPlan(${p.id})" style="border-color:gold;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${p.name}</strong>
                        <b style="color:gold;">${p.price.toLocaleString()} so'm</b>
                    </div>
                </div>
            `).join('') || "Tariflar yo'q";
            document.getElementById('premModal').style.display = 'block';
        }

        async function buyPlan(id) {
            const p = await db.plans.get(id);
            const b = await db.profile.get('balance');
            const e = await db.profile.get('expiry');
            if(b.value >= p.price) {
                await db.profile.put({key:'balance', value: b.value - p.price});
                let ms = p.time;
                if(p.unit === 'min') ms *= 60000; else if(p.unit === 'hour') ms *= 3600000; else ms *= 86400000;
                let newExp = (e.value > Date.now() ? e.value : Date.now()) + ms;
                await db.profile.put({key:'expiry', value: newExp});
                await db.trxs.add({type: "Premium: " + p.name, amount: -p.price, date: new Date().toLocaleString()});
                alert("Premium faollashtirildi!"); closeModal('premModal'); loadUI(); loadMening();
            } else { alert("Mablag' yetarli emas!"); }
        }

        // ADMIN TOOLS
        function addVField() {
            const c = document.getElementById('vContainer');
            const d = document.createElement('div');
            d.style = "padding:10px; border:1px dashed #444; margin-bottom:10px;";
            d.innerHTML = `<small>${c.children.length+1}-qism:</small><input type="file" class="vFiles" accept="video/*">`;
            c.appendChild(d);
        }

        async function saveKino() {
            const title = document.getElementById('kTitle').value;
            const price = parseInt(document.getElementById('kPrice').value) || 0;
            const poster = document.getElementById('kPoster').files[0];
            const vInps = document.querySelectorAll('.vFiles');
            let videos = [];
            for(let i of vInps) { if(i.files[0]) videos.push(i.files[0]); }
            if(!title || !poster || videos.length==0) return alert("Xatolik!");
            await db.movies.add({title, price, poster, videos});
            alert("Saqlandi!"); location.reload();
        }

        async function addPlan() {
            const name = document.getElementById('pName').value;
            const time = parseInt(document.getElementById('pTime').value);
            const unit = document.getElementById('pUnit').value;
            const price = parseInt(document.getElementById('pPrice').value);
            if(!name || !time || !price) return alert("To'liq kiriting!");
            await db.plans.add({name, time, unit, price});
            alert("Tarif qo'shildi!");
        }

        // UI HELPERS
        async function loadContent() {
            const ms = await db.movies.toArray();
            const hL = document.getElementById('heroList');
            const nL = document.getElementById('normalList');
            hL.innerHTML = ''; nL.innerHTML = '';
            ms.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                const badge = m.price > 0 ? `<div style="position:absolute; top:10px; right:10px; background:var(--accent); color:#000; padding:3px 8px; border-radius:8px; font-size:11px; font-weight:800; z-index:5;">${m.price} so'm</div>` : '';
                hL.innerHTML += `<div class="swiper-slide tap-active" onclick="openMovie(${m.id})">${badge}<img src="${img}" style="width:100%; height:100%; object-fit:cover; border-radius:25px;"></div>`;
                nL.innerHTML += `<div class="movie-card tap-active" onclick="openMovie(${m.id})" style="position:relative;">${badge}<img src="${img}" style="width:100%; height:160px; border-radius:20px; object-fit:cover;"><div style="font-weight:bold; margin-top:8px;">${m.title}</div></div>`;
            });
            new Swiper('.hero-swiper', { slidesPerView: 'auto', centeredSlides: true, loop: true, spaceBetween: 15, autoplay: {delay:3000} });
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showAdminLogin() { document.getElementById('loginModal').style.display = 'block'; }
        function checkAdmin() { if(document.getElementById('admPass').value === 'Azizbek') { closeModal('loginModal'); document.getElementById('adminPanel').style.display = 'block'; } else alert('Xato!'); }
        function openDepositModal() { document.getElementById('depositModal').style.display = 'block'; }
        function closePlayer() { document.getElementById('mainVideo').pause(); document.getElementById('player').style.display = 'none'; }
        function skip(s) { document.getElementById('mainVideo').currentTime += s; }
        function togglePlay() { let v = document.getElementById('mainVideo'); let b = document.getElementById('pBtn'); if(v.paused) { v.play(); b.className="fa fa-pause"; } else { v.pause(); b.className="fa fa-play"; } }
        function copyCard() { navigator.clipboard.writeText("8600000000000000"); alert("Nusxalandi!"); }

        init();
    </script>
</body>
