<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PREMIUM</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { 
            --bg: #000; 
            --accent: #00ff73; 
            --card: #121212; 
            --border: #222;
        }

        body { 
            background: var(--bg); color: white; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding-bottom: 90px; overflow-x: hidden;
        }

        .tap-active { transition: transform 0.1s ease; cursor: pointer; }
        .tap-active:active { transform: scale(0.95); opacity: 0.8; }

        /* NAV BAR */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid var(--border); z-index: 1000; 
        }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .siz-btn-oval { 
            display: inline-flex; align-items: center; gap: 8px; 
            background: #1a1a1a; padding: 4px 14px; border-radius: 30px; 
            border: 1.5px solid #333; 
        }
        .nav-avatar-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* PAGES */
        .page { display: none; padding: 15px 5%; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* MOVIE CARDS */
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .movie-card { width: 100%; position: relative; }
        .movie-card img { width: 100%; height: 160px; border-radius: 20px; object-fit: cover; border: 1px solid var(--border); }
        .price-badge { 
            position: absolute; top: 10px; right: 10px; 
            background: var(--accent); color: #000; 
            padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 5;
        }

        /* ONLINE STATUS ANIMATION */
        .online-status {
            color: var(--accent);
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* MOVIE DETAIL PAGE */
        .detail-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .detail-hero { position: relative; width: 100%; height: 500px; }
        .detail-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        .detail-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, #000 15%, transparent 70%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; box-sizing: border-box;
        }
        .d-title { font-size: 48px; font-weight: 900; margin: 0; letter-spacing: 2px; text-transform: uppercase; line-height: 1; }
        .d-sub { color: #ccc; font-size: 18px; margin: 10px 0; }
        .tag-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tag { background: #222; padding: 6px 14px; border-radius: 8px; font-size: 13px; color: #eee; border: 1px solid #333; }

        .part-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .part-btn { 
            background: #111; border: 1.5px solid #333; color: white; padding: 14px; 
            border-radius: 12px; font-weight: 900; text-align: center; font-size: 13px; transition: 0.2s;
        }
        .part-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,115,0.3); }

        .btn-play-green {
            background: linear-gradient(90deg, #00ff73, #00cc5c);
            color: #000; width: 100%; padding: 18px; border-radius: 15px;
            font-size: 19px; font-weight: 900; border: none; display: flex;
            align-items: center; justify-content: center; gap: 15px;
        }

        /* PLAYER */
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; }
        .player-controls {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 50px; z-index: 3010;
        }
        .p-icon { font-size: 35px; color: white; text-shadow: 0 0 10px #000; opacity: 0.9; }

        /* TRANSACTIONS */
        .history-card { background: #111; padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); margin-bottom: 12px; }
        .trx-row { display: flex; justify-content: space-between; align-items: center; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2500; overflow-y: auto; }
        .modal-content { background: #111; border-radius: 30px; padding: 25px; margin: 50px 15px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-adm { background: var(--accent); color: #000; width: 100%; padding: 16px; border-radius: 12px; font-weight: 900; border: none; margin-bottom: 10px; }

        .hero-swiper { width: 100%; height: 350px; margin-bottom: 20px; }
        .swiper-slide { width: 85% !important; border-radius: 30px; overflow: hidden; transform: scale(0.9); transition: 0.3s; }
        .swiper-slide-active { transform: scale(1); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="toast" style="display:none; position:fixed; top:30px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; padding:10px 25px; border-radius:30px; font-weight:900; z-index:4000;">Xabar yuborildi!</div>

    <!-- HOME -->
    <div id="home" class="page active">
        <div class="swiper hero-swiper">
            <div class="swiper-wrapper" id="heroList"></div>
        </div>
        <div style="font-weight: 900; font-size: 20px; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px;">Kinolar</div>
        <div class="movie-grid" id="normalList"></div>
    </div>

    <!-- SEARCH -->
    <div id="search" class="page">
        <input type="text" id="searchInput" placeholder="Kino nomini yozing..." oninput="searchMovie()" style="margin-top:20px;">
        <div class="movie-grid" id="searchResult"></div>
    </div>

    <!-- MENING -->
    <div id="mening" class="page">
        <h3 style="border-left:4px solid var(--accent); padding-left:10px;">Oxirgi ko'rilganlar</h3>
        <div id="historyList" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:15px; margin-bottom:25px;"></div>
        <h3 style="border-left:4px solid var(--accent); padding-left:10px;">To'lovlar tarixi</h3>
        <div id="trxList"></div>
    </div>

    <!-- SIZ (PROFIL) -->
    <div id="siz" class="page">
        <div style="display: flex; align-items: center; gap: 20px; padding: 30px 0;">
            <img src="" id="mainAvatar" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--accent);">
            <div>
                <div style="display: flex; align-items: center;">
                    <h2 id="tgName" style="margin:0;">Yuklanmoqda...</h2>
                    <span class="online-status">● Onlayn</span>
                </div>
                <div id="premTimer" style="font-size: 13px; color: var(--accent); font-weight: 900; margin-top: 5px;"></div>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="status-card tap-active" onclick="openPremModal()" style="background:#111; padding:20px; border-radius:25px;">
                <span style="color:#ff453a; font-size:11px; font-weight: 900;">PREMIUM</span><br><strong style="font-size:18px;">Sotib olish</strong>
            </div>
            <div class="status-card tap-active" onclick="openDepModal()" style="background:#111; padding:20px; border-radius:25px;">
                <span style="color:#888; font-size:11px; font-weight: 900;">HISOB</span><br><strong id="userBalance" style="font-size:18px;">0 so'm</strong>
            </div>
        </div>
        <div style="margin-top:20px; background:#111; border-radius:20px; overflow:hidden;">
            <div class="tap-active" style="padding:18px; border-bottom:1px solid #222;" onclick="showAdminLogin()"><i class="fa fa-user-shield" style="margin-right:15px; color:var(--accent);"></i> Admin Panel</div>
        </div>
    </div>

    <!-- OTHER MODALS & PLAYER (unchanged logic) -->
    <div id="detailPage" class="detail-page">
        <i class="fa fa-arrow-left" onclick="closeDetail()" style="position:fixed; top:25px; left:20px; z-index:2100; font-size:22px;"></i>
        <div id="detailContent"></div>
    </div>

    <div id="player">
        <i class="fa fa-arrow-left" onclick="closePlayer()" style="position:absolute; top:25px; left:20px; z-index:3020; font-size:22px;"></i>
        <video id="mainVideo" style="width:100%; height:100%;" playsinline></video>
        <div class="player-controls">
            <i class="fa fa-backward-step p-icon" onclick="skip(-10)"></i>
            <i id="playBtn" class="fa fa-pause p-icon" onclick="togglePlay()"></i>
            <i class="fa fa-forward-step p-icon" onclick="skip(10)"></i>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div style="padding:20px;">
            <h2 style="display:flex; justify-content:space-between;">Admin Panel <span onclick="closeModal('adminPanel')">&times;</span></h2>
            <div class="modal-content" style="margin:0 0 20px 0;">
                <h3>Sozlamalar</h3>
                <input type="text" id="setToken" placeholder="Bot Token">
                <input type="text" id="setAdminId" placeholder="Admin Chat ID">
                <input type="text" id="setCard" placeholder="Karta raqami">
                <button class="btn-adm" onclick="saveSettings()">SOZLAMALARNI SAQLASH</button>
            </div>
            <div class="modal-content" style="margin:0 0 20px 0;">
                <h3>Premium Tarif Qo'shish</h3>
                <input type="text" id="pName" placeholder="Nomi">
                <input type="number" id="pTime" placeholder="Vaqt miqdori">
                <select id="pUnit"><option value="min">Minut</option><option value="hour">Soat</option><option value="day">Kun</option></select>
                <input type="number" id="pPrice" placeholder="Narxi">
                <button class="btn-adm" onclick="addPlan()">TARIFNI QO'SHISH</button>
            </div>
            <div class="modal-content" style="margin:0;">
                <h3>Yangi Kino</h3>
                <input type="text" id="kTitle" placeholder="Kino nomi">
                <input type="text" id="kSub" placeholder="Subtitle">
                <input type="text" id="kGenre" placeholder="Janr">
                <input type="number" id="kPrice" placeholder="Narxi">
                <small>Poster:</small><input type="file" id="kPoster" accept="image/*">
                <div id="vFields">
                    <div style="padding:10px; border:1px dashed #444; margin-bottom:10px;">
                        <small>1-qism video:</small><input type="file" class="vInps" accept="video/*">
                    </div>
                </div>
                <button class="btn-adm" style="background:#333; color:#fff;" onclick="addVField()">+ Yana qism</button>
                <button class="btn-adm" onclick="saveKino()">KINONI YUKLASH</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal"><div class="modal-content" style="max-width:300px; margin:150px auto;"><h3>Admin</h3><input type="password" id="admPass"><button class="btn-adm" onclick="checkAdmin()">KIRISH</button></div></div>
    <div id="depModal" class="modal"><div class="modal-content"><h2>To'ldirish</h2><div id="cardText" style="background:linear-gradient(90deg,#00ff73,#008f41); padding:20px; border-radius:15px; color:#000; font-weight:900; margin-bottom:15px;" onclick="copyCard()">8600...</div><input type="number" id="dSum" placeholder="Summa"><input type="file" id="dImg" accept="image/*"><button class="btn-adm" onclick="sendDep()">TASDIQLASHGA YUBORISH</button><button class="btn-adm" style="background:none; color:#fff;" onclick="closeModal('depModal')">YOPISH</button></div></div>
    <div id="premModal" class="modal"><div class="modal-content"><h2>Tariflar</h2><div id="pList"></div><button class="btn-adm" style="background:none; color:#fff;" onclick="closeModal('premModal')">YOPISH</button></div></div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active tap-active" onclick="showPage('home', this)"><i class="fa fa-home"></i><br>Asosiy</div>
        <div class="nav-item tap-active" onclick="showPage('search', this)"><i class="fa fa-search"></i><br>Qidiruv</div>
        <div class="nav-item tap-active" onclick="showPage('mening', this)"><i class="fa fa-bookmark"></i><br>Mening</div>
        <div class="nav-item tap-active" onclick="showPage('siz', this)"><div class="siz-btn-oval"><img src="" id="navAvatar" class="nav-avatar-img"><b>Siz</b></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const db = new Dexie("KinoDrama_Final_Store");
        db.version(1).stores({
            movies: "++id, title, price",
            profile: "key, value",
            settings: "key, value",
            plans: "++id, name, price",
            history: "++id, mId, time",
            trxs: "++id, type, amount, date"
        });

        const tg = window.Telegram.WebApp;
        let activePart = 0;

        async function init() {
            if (tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                await db.profile.put({ key: 'user_info', value: { name: u.first_name, img: u.photo_url || "https://ui-avatars.com/api/?name="+u.first_name, id: u.id } });
            }
            if(!(await db.profile.get('balance'))) await db.profile.put({key:'balance', value: 0});
            if(!(await db.profile.get('expiry'))) await db.profile.put({key:'expiry', value: 0});
            if(!(await db.settings.get('card'))) await db.settings.put({key:'card', value: '8600 0000 0000 0000'});
            
            loadUI(); loadContent(); loadMening(); tg.expand();
            
            // Orqaga sanoq taymeri
            setInterval(updateCountdown, 1000);
        }

        async function loadUI() {
            const info = await db.profile.get('user_info');
            const bal = await db.profile.get('balance');
            const card = await db.settings.get('card');

            if(info) {
                document.getElementById('mainAvatar').src = info.value.img;
                document.getElementById('navAvatar').src = info.value.img;
                document.getElementById('tgName').innerText = info.value.name;
            }
            document.getElementById('userBalance').innerText = (bal.value || 0).toLocaleString() + " so'm";
            document.getElementById('cardText').innerText = card.value;
            updateCountdown();
        }

        async function updateCountdown() {
            const exp = await db.profile.get('expiry');
            const timerEl = document.getElementById('premTimer');
            if(!timerEl) return;

            const now = Date.now();
            if(exp && exp.value > now) {
                let diff = exp.value - now;
                let d = Math.floor(diff / 86400000);
                let h = Math.floor((diff % 86400000) / 3600000);
                let m = Math.floor((diff % 3600000) / 60000);
                let s = Math.floor((diff % 60000) / 1000);
                
                timerEl.innerText = `Premium: FAOL (${d}k ${h}s ${m}m ${s}s qoldi)`;
                timerEl.style.color = "var(--accent)";
            } else {
                timerEl.innerText = "Premium: Faol emas ❌";
                timerEl.style.color = "#888";
            }
        }

        // --- BOSHQA FUNKSIYALAR (O'zgarishsiz qoldi) ---
        async function openMovie(id) {
            const m = await db.movies.get(id);
            const poster = URL.createObjectURL(m.poster);
            activePart = 0;
            let parts = m.videos.map((v, i) => `<div class="part-btn tap-active ${i===0?'selected':''}" id="part-${i}" onclick="setPart(${i})">${i+1}-qism</div>`).join('');
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-hero"><img src="${poster}"><div class="detail-overlay">
                <h1 class="d-title">${m.title}</h1><div class="d-sub">${m.sub || ''}</div>
                <div class="tag-row"><span class="tag">Turkiya</span><span class="tag">${m.genre}</span></div>
                <div class="part-grid">${parts}</div>
                <button class="btn-play-green tap-active" onclick="checkPlay(${m.id})"><i class="fa fa-play"></i> Ko'rish</button>
                </div></div>`;
            document.getElementById('detailPage').style.display = 'block';
        }

        function setPart(idx) {
            document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(`part-${idx}`).classList.add('selected');
            activePart = idx;
        }

        async function checkPlay(id) {
            const m = await db.movies.get(id);
            const bal = await db.profile.get('balance');
            const exp = await db.profile.get('expiry');
            if(m.price == 0 || exp.value > Date.now()) {
                startPlayer(m.videos[activePart], id);
            } else {
                if(confirm(`Kino pullik: ${m.price} so'm. Sotib olasizmi?`)) {
                    if(bal.value >= m.price) {
                        await db.profile.put({key:'balance', value: bal.value - m.price});
                        await db.trxs.add({type: "Kino: " + m.title, amount: -m.price, date: new Date().toLocaleString()});
                        loadUI(); startPlayer(m.videos[activePart], id);
                    } else { alert("Mablag' kam!"); openDepModal(); }
                }
            }
        }

        function startPlayer(blob, mId) {
            const v = document.getElementById('mainVideo');
            v.src = URL.createObjectURL(blob);
            document.getElementById('player').style.display = 'block';
            v.play();
            db.history.add({mId, time: Date.now()});
        }

        async function buyPlan(id) {
            const p = await db.plans.get(id), b = await db.profile.get('balance'), e = await db.profile.get('expiry');
            if(b.value >= p.price) {
                await db.profile.put({key:'balance', value: b.value - p.price});
                let ms = p.time; 
                if(p.unit==='min') ms*=60000; else if(p.unit==='hour') ms*=3600000; else ms*=86400000;
                await db.profile.put({key:'expiry', value: (e.value>Date.now()?e.value:Date.now())+ms});
                await db.trxs.add({type: "Premium: "+p.name, amount: -p.price, date: new Date().toLocaleString()});
                alert("Premium faol!"); closeModal('premModal'); loadUI();
            } else alert("Mablag' kam!");
        }

        // Admin & UI Logic
        function showPage(id, el) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showAdminLogin() { document.getElementById('loginModal').style.display = 'block'; }
        function checkAdmin() { if(document.getElementById('admPass').value === 'Azizbek') { closeModal('loginModal'); document.getElementById('adminPanel').style.display = 'block'; } else alert('Xato!'); }
        function openDepModal() { document.getElementById('depModal').style.display = 'block'; }
        async function openPremModal() {
            const ps = await db.plans.toArray();
            document.getElementById('pList').innerHTML = ps.map(p => `<div class="history-card tap-active" onclick="buyPlan(${p.id})" style="border-color:gold;"><b>${p.name}</b><br><span style="color:gold;">${p.price.toLocaleString()} so'm</span></div>`).join('');
            document.getElementById('premModal').style.display = 'block';
        }
        function closePlayer() { document.getElementById('mainVideo').pause(); document.getElementById('player').style.display = 'none'; }
        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }
        function skip(s) { document.getElementById('mainVideo').currentTime += s; }
        function togglePlay() { let v = document.getElementById('mainVideo'); let b = document.getElementById('playBtn'); if(v.paused) { v.play(); b.className="fa fa-pause p-icon"; } else { v.pause(); b.className="fa fa-play p-icon"; } }
        async function saveSettings() { await db.settings.put({key:'token', value: document.getElementById('setToken').value}); await db.settings.put({key:'admin_id', value: document.getElementById('setAdminId').value}); await db.settings.put({key:'card', value: document.getElementById('setCard').value}); alert("Saqlandi!"); loadUI(); }
        function copyCard() { navigator.clipboard.writeText(document.getElementById('cardText').innerText); alert("Nusxalandi!"); }
        function addVField() { const c = document.getElementById('vFields'); const d = document.createElement('div'); d.style="padding:10px; border:1px dashed #444; margin-bottom:10px;"; d.innerHTML = `<small>${c.children.length+1}-qism:</small><input type="file" class="vInps" accept="video/*">`; c.appendChild(d); }
        async function addPlan() { const name = document.getElementById('pName').value, time = parseInt(document.getElementById('pTime').value), unit = document.getElementById('pUnit').value, price = parseInt(document.getElementById('pPrice').value); await db.plans.add({name, time, unit, price}); alert("Saqlandi!"); }
        async function saveKino() {
            const title = document.getElementById('kTitle').value, sub = document.getElementById('kSub').value, genre = document.getElementById('kGenre').value, price = parseInt(document.getElementById('kPrice').value)||0, poster = document.getElementById('kPoster').files[0];
            let videos = []; document.querySelectorAll('.vInps').forEach(i => { if(i.files[0]) videos.push(i.files[0]); });
            if(!title || !poster || videos.length==0) return alert("To'liq!");
            await db.movies.add({title, sub, genre, price, poster, videos}); alert("Kino yuklandi!"); location.reload();
        }
        async function loadContent() {
            const ms = await db.movies.toArray(); const hL = document.getElementById('heroList'); const nL = document.getElementById('normalList');
            hL.innerHTML = ''; nL.innerHTML = '';
            ms.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                const badge = m.price > 0 ? `<div class="price-badge">${m.price} so'm</div>` : '';
                hL.innerHTML += `<div class="swiper-slide tap-active" onclick="openMovie(${m.id})">${badge}<img src="${img}" class="hero-img"></div>`;
                nL.innerHTML += `<div class="movie-card tap-active" onclick="openMovie(${m.id})">${badge}<img src="${img}"><div style="font-weight:900;margin-top:8px;">${m.title}</div><small style="color:#888">${m.genre}</small></div>`;
            });
            new Swiper('.hero-swiper', { slidesPerView: 'auto', centeredSlides: true, loop: true, spaceBetween: 15, autoplay: {delay:3000} });
        }
        async function loadMening() {
            const hist = await db.history.orderBy('time').reverse().limit(6).toArray();
            const hList = document.getElementById('historyList'); hList.innerHTML = '';
            for(let h of hist) {
                const m = await db.movies.get(h.mId);
                if(m) {
                    const img = URL.createObjectURL(m.poster);
                    hList.innerHTML += `<div onclick="openMovie(${m.id})" style="min-width:130px;"><img src="${img}" style="width:130px;height:85px;border-radius:12px;object-fit:cover;"><div style="font-size:11px;font-weight:900;white-space:nowrap;overflow:hidden;">${m.title}</div></div>`;
                }
            }
            const trxs = await db.trxs.orderBy('id').reverse().toArray();
            document.getElementById('trxList').innerHTML = trxs.map(t => `<div class="history-card"><div class="trx-row"><b>${t.type}</b> <span style="color:${t.amount>0?'#00ff73':'#ff453a'}">${t.amount>0?'+':''}${t.amount} so'm</span></div><div style="font-size:10px; color:#888; margin-top:5px;">${t.date}</div></div>`).join('') || "<small>Tranzaksiyalar yo'q</small>";
        }

        init();
    </script>
</body>
</html>
