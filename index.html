<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frame - Online Kinoteatr</title>
    
    <!-- Kutubxonalar -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #0b0b0b;
            --card-bg: #151515;
            --accent: #00ff73; /* Rasmdagi yashil chiziq uchun */
            --gray-btn: #2a2a2a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            padding-bottom: 80px; /* Pastki menyu uchun joy */
            overflow-x: hidden;
            user-select: none;
        }

        /* --- HEADER & HERO --- */
        .hero-container {
            width: 100%;
            height: 450px;
            padding-top: 20px;
        }

        .swiper-slide {
            width: 85% !important;
            height: 400px;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            transform: scale(0.9);
            transition: 0.3s;
        }
        .swiper-slide-active { transform: scale(1); }

        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        
        .hero-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 10%, transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            box-sizing: border-box;
        }

        .hero-title { font-size: 35px; font-weight: 900; font-style: italic; margin: 0; text-transform: lowercase; }
        
        .badge-group { position: absolute; top: 15px; left: 15px; display: flex; gap: 8px; }
        .badge { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); padding: 5px 12px; border-radius: 10px; font-size: 12px; }
        .age-badge { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; }

        /* --- CATEGORIES --- */
        .cat-scroll { display: flex; gap: 10px; padding: 10px 5%; overflow-x: auto; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        
        .cat-pill {
            background: var(--gray-btn); padding: 12px 20px; border-radius: 20px;
            font-size: 15px; font-weight: 500; white-space: nowrap; cursor: pointer;
        }
        .cat-pill.special { background: #333; display: flex; align-items: center; gap: 8px; }

        /* --- SECTIONS --- */
        .section-title {
            padding: 20px 5% 10px;
            font-size: 18px; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ""; width: 3px; height: 20px; background: var(--accent); border-radius: 2px; }

        .continue-grid { display: flex; gap: 15px; padding: 0 5%; overflow-x: auto; scrollbar-width: none; }
        .continue-card { width: 220px; flex-shrink: 0; }
        .continue-thumb { 
            width: 100%; height: 125px; border-radius: 15px; object-fit: cover; 
            background: var(--card-bg); margin-bottom: 8px;
        }
        .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .progress-bar { width: 40%; height: 100%; background: #fff; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(15,15,15,0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; color: #888; font-size: 11px; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
        .nav-item img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #444; }

        /* --- ADMIN PANEL --- */
        .admin-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; padding: 20px; box-sizing: border-box;
        }
        .form-box { max-width: 400px; margin: 40px auto; }
        input, select { width: 100%; padding: 15px; background: #222; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .btn-post { width: 100%; padding: 15px; background: #fff; color: #000; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }

        /* --- PLAYER --- */
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; }
        video { width: 100%; height: 100%; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; z-index: 3001; }
    </style>
</head>
<body>

    <!-- HERO SLIDER -->
    <div class="swiper hero-container">
        <div class="swiper-wrapper" id="heroWrapper">
            <!-- Slayderlar admin yuklaganda shu yerga tushadi -->
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <!-- CATEGORIES -->
    <div class="cat-scroll">
        <div class="cat-pill special">Xammasi birgalikda <i class="fa fa-chevron-right" style="font-size: 10px;"></i></div>
        <div class="cat-pill">Filmlar</div>
        <div class="cat-pill">Seriallar</div>
        <div class="cat-pill">Multfilmlar</div>
    </div>

    <!-- CONTINUE WATCHING -->
    <div class="section-title">Ko'rishni davom ettirish</div>
    <div class="continue-grid" id="continueList">
        <!-- Kinolar ro'yxati -->
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()">
            <i class="fa fa-home"></i> Bosh sahifa
        </div>
        <div class="nav-item">
            <i class="fa fa-search"></i> Katalog
        </div>
        <div class="nav-item">
            <i class="fa fa-tv"></i> Tv
        </div>
        <div class="nav-item" onclick="openAdmin()">
            <i class="fa fa-bookmark"></i> Mening
        </div>
        <div class="nav-item">
            <img src="https://via.placeholder.com/50" alt="User"> Frame
        </div>
    </div>

    <!-- ADMIN LOGIN MODAL -->
    <div id="adminLogin" class="admin-modal">
        <div class="form-box">
            <h2 style="text-align: center;">Admin Kirish</h2>
            <input type="text" id="user" placeholder="Login">
            <input type="password" id="pass" placeholder="Parol">
            <button class="btn-post" onclick="checkAuth()">KIRISH</button>
            <p onclick="closeModal('adminLogin')" style="text-align:center; color:#888; margin-top:20px;">Yopish</p>
        </div>
    </div>

    <!-- ADMIN PANEL (UPLOAD) -->
    <div id="adminDash" class="admin-modal">
        <div class="form-box">
            <h2>Kino Qo'shish</h2>
            <input type="text" id="mTitle" placeholder="Kino nomi">
            <label>Poster (Rasm):</label>
            <input type="file" id="mPoster" accept="image/*">
            <label>Video fayl:</label>
            <input type="file" id="mVideo" accept="video/mp4">
            <button class="btn-post" onclick="saveMovie()">SAYTGA JOYLASHTIRISH</button>
            
            <h3 style="margin-top:40px;">O'chirish</h3>
            <div id="deleteList"></div>
            <button class="btn-post" style="background:#444; color:white; margin-top:20px;" onclick="closeModal('adminDash')">Panelni yopish</button>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="player">
        <i class="fa fa-times close-btn" onclick="closePlayer()"></i>
        <video id="v-tag" controls autoplay></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // 1. Ma'lumotlar bazasi
        const db = new Dexie("FrameDB");
        db.version(1).stores({ movies: "++id, title" });

        // 2. Swiper Init
        const swiper = new Swiper('.hero-container', {
            slidesPerView: 'auto',
            centeredSlides: true,
            spaceBetween: -10,
            loop: true,
        });

        // 3. Admin Login
        function openAdmin() {
            if(localStorage.getItem('isAdmin') === 'true') {
                document.getElementById('adminDash').style.display = 'block';
                renderAdminList();
            } else {
                document.getElementById('adminLogin').style.display = 'block';
            }
        }

        function checkAuth() {
            if(document.getElementById('user').value === "Aziz" && document.getElementById('pass').value === "Azizbek") {
                localStorage.setItem('isAdmin', 'true');
                document.getElementById('adminLogin').style.display = 'none';
                openAdmin();
            } else { alert("Xato!"); }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 4. Video qo'shish
        async function saveMovie() {
            const title = document.getElementById('mTitle').value;
            const poster = document.getElementById('mPoster').files[0];
            const video = document.getElementById('mVideo').files[0];

            if(!title || !poster || !video) return alert("Hamma fayllarni tanlang!");

            await db.movies.add({ title, poster, video });
            alert("Yuklandi!");
            location.reload();
        }

        // 5. Kinolarni ko'rsatish
        async function loadContent() {
            const movies = await db.movies.toArray();
            const heroWrapper = document.getElementById('heroWrapper');
            const continueList = document.getElementById('continueList');

            movies.forEach(m => {
                const posterUrl = URL.createObjectURL(m.poster);
                
                // Hero Slayder
                heroWrapper.innerHTML += `
                    <div class="swiper-slide" onclick="playMovie(${m.id})">
                        <img src="${posterUrl}" class="hero-img">
                        <div class="badge-group">
                            <span class="badge">Boevik</span>
                            <span class="badge">Sarguzashtlar</span>
                        </div>
                        <span class="age-badge">13+</span>
                        <div class="hero-overlay">
                            <h1 class="hero-title">${m.title}</h1>
                        </div>
                    </div>
                `;

                // Davom ettirish ro'yxati
                continueList.innerHTML += `
                    <div class="continue-card" onclick="playMovie(${m.id})">
                        <img src="${posterUrl}" class="continue-thumb">
                        <div style="font-size:14px; font-weight:500;">${m.title}</div>
                        <div style="font-size:12px; color:#888;">Film <span style="float:right;">1s 38daq</span></div>
                        <div class="progress-container"><div class="progress-bar"></div></div>
                    </div>
                `;
            });
            swiper.update();
        }

        // 6. Player
        async function playMovie(id) {
            const m = await db.movies.get(id);
            const player = document.getElementById('player');
            const video = document.getElementById('v-tag');
            player.style.display = 'block';
            video.src = URL.createObjectURL(m.video);
        }

        function closePlayer() {
            const video = document.getElementById('v-tag');
            video.pause();
            document.getElementById('player').style.display = 'none';
        }

        // Admin ro'yxati (O'chirish uchun)
        async function renderAdminList() {
            const movies = await db.movies.toArray();
            document.getElementById('deleteList').innerHTML = movies.map(m => `
                <div style="display:flex; justify-content:space-between; background:#333; padding:15px; border-radius:10px; margin-bottom:10px;">
                    <span>${m.title}</span>
                    <i class="fa fa-trash" style="color:red;" onclick="deleteMovie(${m.id})"></i>
                </div>
            `).join('');
        }

        async function deleteMovie(id) {
            if(confirm("O'chirilsinmi?")) {
                await db.movies.delete(id);
                renderAdminList();
                alert("O'chirildi");
            }
        }

        loadContent();
    </script>
</body>
</html>
