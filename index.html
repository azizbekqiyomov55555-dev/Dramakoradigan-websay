<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PREMIUM</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #000; --accent: #00ff73; --card: #121212; --border: #222; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .tap-active { transition: transform 0.1s ease; cursor: pointer; }
        .tap-active:active { transform: scale(0.95); opacity: 0.8; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .siz-btn-oval { display: inline-flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 4px 14px; border-radius: 30px; border: 1.5px solid #333; }
        .nav-avatar-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* --- PAGES --- */
        .page { display: none; padding: 15px 5%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS & GRID --- */
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .movie-card { width: 100%; position: relative; }
        .movie-card img { width: 100%; height: 115px; border-radius: 20px; object-fit: cover; border: 1px solid #222; }
        .price-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #000; padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .status-card { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 15px; }

        /* --- MODALS (SLIDE UP) --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; }
        .modal-content { position: absolute; bottom: -100%; left: 0; width: 100%; background: #111; border-radius: 35px 35px 0 0; padding: 30px 20px 50px; box-sizing: border-box; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-top: 1px solid var(--accent); }
        .modal.active .modal-content { bottom: 0; }

        /* Karta Vizuali */
        .payment-card { background: linear-gradient(135deg, #00ff73 0%, #008f41 100%); padding: 25px; border-radius: 20px; color: #000; margin: 20px 0; position: relative; overflow: hidden; }
        .card-number { font-size: 22px; font-weight: 900; letter-spacing: 2px; display: block; margin: 10px 0; }

        /* Inputlar */
        input { width: 100%; padding: 18px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 15px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #fff; }

        /* Custom Upload */
        .file-upload-label { display: flex; align-items: center; justify-content: center; gap: 10px; background: #222; padding: 18px; border-radius: 15px; border: 2px dashed #444; margin-bottom: 20px; color: #888; }
        input[type="file"] { display: none; }

        /* HERO SLIDER */
        .hero-swiper { width: 100%; height: 400px; margin-bottom: 20px; }
        .swiper-slide { width: 85% !important; border-radius: 30px; overflow: hidden; transform: scale(0.9); transition: 0.3s; }
        .swiper-slide-active { transform: scale(1); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <!-- BOSH SAHIFA -->
    <div id="home" class="page active">
        <div class="swiper hero-swiper">
            <div class="swiper-wrapper" id="heroList"></div>
        </div>
        <div style="font-weight: 900; font-size: 20px; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px;">Kinolar</div>
        <div class="movie-grid" id="normalList"></div>
    </div>

    <!-- SIZ (PROFIL) -->
    <div id="siz" class="page">
        <div style="display: flex; align-items: center; gap: 20px; padding: 30px 0;">
            <img src="" id="mainAvatar" style="width:85px; height:85px; border-radius:50%; border:3px solid var(--accent); padding:3px;">
            <div>
                <h2 id="tgName" style="margin:0; font-size: 26px;">Ism...</h2>
                <div id="premiumTimer" style="font-size: 13px; color: var(--accent); font-weight: bold; margin-top: 5px;"></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="status-card tap-active" onclick="openPremiumModal()">
                <span style="color:#ff453a; font-size:12px; font-weight: 800;">PREMIUM</span><br>
                <strong style="font-size: 18px;">Sotib olish</strong>
            </div>
            <div class="status-card tap-active" onclick="openDepositModal()">
                <span style="color:#888; font-size:12px; font-weight: 800;">HISOB</span><br>
                <strong id="userBalance" style="font-size: 18px;">0 so'm</strong>
            </div>
        </div>

        <div class="status-card" style="padding:0; overflow:hidden;">
            <div class="tap-active" style="padding:20px; border-bottom:1px solid #222;" onclick="openAdmin()"><i class="fa fa-user-shield" style="margin-right:15px; color:var(--accent);"></i> Admin Panel</div>
            <div class="tap-active" style="padding:20px;"><i class="fa fa-gear" style="margin-right:15px; color:var(--accent);"></i> Sozlamalar</div>
        </div>
    </div>

    <!-- HISOB TO'LDIRISH MODAL -->
    <div id="depositModal" class="modal" onclick="if(event.target == this) closeDepositModal()">
        <div class="modal-content">
            <div style="width:50px; height:5px; background:#333; border-radius:10px; margin: 0 auto 20px;"></div>
            <h2>Hisobni to'ldirish</h2>
            <div class="payment-card tap-active" onclick="copyCard()">
                <span style="font-size:12px; opacity:0.8;">Karta: KINO DRAMA</span>
                <span id="displayCard" class="card-number">8600 0000 0000 0000</span>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:12px;">Humo / Uzcard</span>
                    <i class="fa fa-copy"></i>
                </div>
            </div>

            <input type="number" id="depAmount" placeholder="To'lov summasi (so'm)">
            <label for="depCheck" class="file-upload-label tap-active">
                <i class="fa fa-cloud-upload"></i> <span id="fileName">Chekni yuklash</span>
            </label>
            <input type="file" id="depCheck" onchange="document.getElementById('fileName').innerText = this.files[0].name">

            <button class="btn btn-accent tap-active" id="btnSendDeposit" onclick="submitDeposit()">TO'LOVNI YUBORISH</button>
            <button class="btn btn-outline tap-active" style="margin-top:10px;" onclick="closeDepositModal()">YOPISH</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="modal" style="display:none; overflow-y:auto;">
        <div style="padding:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Admin Panel</h2>
                <i class="fa fa-times-circle" style="font-size:30px;" onclick="closeAdmin()"></i>
            </div>
            
            <div class="status-card">
                <h3>Bot Sozlamalari</h3>
                <input type="text" id="botToken" placeholder="Bot Token">
                <input type="text" id="adminId" placeholder="Admin Chat ID">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-accent" onclick="saveBotSettings()">SAQLASH</button>
                    <button class="btn btn-outline" onclick="testBotConnection()">TEKSHIRISH</button>
                </div>
            </div>

            <div class="status-card">
                <h3>Karta raqami</h3>
                <input type="text" id="adminCardNum" placeholder="Karta raqami">
                <button class="btn btn-accent" onclick="saveCard()">SAQLASH</button>
            </div>

            <div class="status-card">
                <h3>Yangi Kino</h3>
                <input type="text" id="kTitle" placeholder="Nomi">
                <input type="number" id="kPrice" placeholder="Narxi">
                <input type="file" id="kPoster" accept="image/*">
                <input type="file" id="kVideo" accept="video/*">
                <button class="btn btn-accent" onclick="saveKino()">KINONI YUKLASH</button>
            </div>
        </div>
    </div>

    <!-- NAV BAR -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fa fa-home" style="font-size:22px;"></i><br>Asosiy</div>
        <div class="nav-item" onclick="showPage('siz', this)">
            <div class="siz-btn-oval">
                <img src="" id="navAvatar" class="nav-avatar-img">
                <span>Siz</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const db = new Dexie("KinoDramaUltimateDB");
        db.version(1).stores({
            movies: "++id, title, price",
            profile: "key, value",
            settings: "key, value"
        });

        const tg = window.Telegram.WebApp;

        async function init() {
            if (tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                await db.profile.put({ key: 'user_info', value: { name: user.first_name, img: user.photo_url || "https://ui-avatars.com/api/?name="+user.first_name+"&background=00ff73&color=000" } });
            }
            const bal = await db.profile.get('balance'); if(!bal) await db.profile.put({key:'balance', value: 0});
            const card = await db.settings.get('card_number'); if(!card) await db.settings.put({key:'card_number', value: '8600...'});
            
            loadUI();
            loadContent();
            tg.expand();
        }

        async function loadUI() {
            const info = await db.profile.get('user_info');
            const bal = await db.profile.get('balance');
            const card = await db.settings.get('card_number');
            const botToken = await db.settings.get('bot_token');
            const adminId = await db.settings.get('admin_id');

            if(info) {
                document.getElementById('mainAvatar').src = info.value.img;
                document.getElementById('navAvatar').src = info.value.img;
                document.getElementById('tgName').innerText = info.value.name;
            }
            document.getElementById('userBalance').innerText = (bal.value || 0).toLocaleString() + " so'm";
            document.getElementById('displayCard').innerText = card.value;
            document.getElementById('adminCardNum').value = card.value;
            if(botToken) document.getElementById('botToken').value = botToken.value;
            if(adminId) document.getElementById('adminId').value = adminId.value;
        }

        // --- BOT BILAN ISHLASH ---

        async function saveBotSettings() {
            const token = document.getElementById('botToken').value;
            const aid = document.getElementById('adminId').value;
            await db.settings.put({key:'bot_token', value: token});
            await db.settings.put({key:'admin_id', value: aid});
            alert("Bot sozlamalari saqlandi!");
        }

        async function testBotConnection() {
            const token = document.getElementById('botToken').value;
            const aid = document.getElementById('adminId').value;
            if(!token || !aid) return alert("Avval token va ID ni kiriting!");

            const url = `https://api.telegram.org/bot${token}/sendMessage`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: aid, text: "✅ Bot muvaffaqiyatli ulandi saytga!" })
                });
                if(res.ok) alert("Xabar yuborildi! Botni tekshiring.");
                else alert("Xatolik! Token yoki ID noto'g'ri.");
            } catch(e) { alert("Ulanishda xatolik!"); }
        }

        async function submitDeposit() {
            const amount = document.getElementById('depAmount').value;
            const file = document.getElementById('depCheck').files[0];
            const tokenObj = await db.settings.get('bot_token');
            const adminObj = await db.settings.get('admin_id');
            const info = await db.profile.get('user_info');

            if(!amount || !file || !tokenObj || !adminObj) return alert("Ma'lumotlar to'liq emas!");

            const btn = document.getElementById('btnSendDeposit');
            btn.innerText = "YUBORILMOQDA...";
            btn.disabled = true;

            const date = new Date().toLocaleString('uz-UZ');
            const caption = `💰 YANGI TO'LOV!\n\n👤 Ism: ${info.value.name}\n💵 Summa: ${amount} so'm\n📅 Sana: ${date}\n\nIltimos, chekni tekshirib balansni tasdiqlang.`;

            const formData = new FormData();
            formData.append('chat_id', adminObj.value);
            formData.append('photo', file);
            formData.append('caption', caption);

            try {
                const res = await fetch(`https://api.telegram.org/bot${tokenObj.value}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                if(res.ok) {
                    alert("To'lov cheki adminlarga yuborildi! Tez orada hisobingiz to'ldiriladi.");
                    closeDepositModal();
                } else {
                    alert("Botga yuborishda xatolik yuz berdi.");
                }
            } catch(e) { alert("Xatolik yuz berdi!"); }
            finally {
                btn.innerText = "TO'LOVNI YUBORISH";
                btn.disabled = false;
            }
        }

        // --- QOLGAN FUNKSIYALAR ---

        function openDepositModal() { document.getElementById('depositModal').style.display = 'block'; setTimeout(() => document.getElementById('depositModal').classList.add('active'), 10); }
        function closeDepositModal() { document.getElementById('depositModal').classList.remove('active'); setTimeout(() => document.getElementById('depositModal').style.display = 'none', 400); }
        
        function openAdmin() { 
            const p = prompt("Parol:"); 
            if(p === 'Azizbek') document.getElementById('adminPanel').style.display = 'block'; 
            else alert("Xato!");
        }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        async function saveCard() {
            const card = document.getElementById('adminCardNum').value;
            await db.settings.put({key:'card_number', value: card});
            alert("Karta raqami saqlandi!");
            loadUI();
        }

        async function saveKino() {
            const title = document.getElementById('kTitle').value;
            const price = parseInt(document.getElementById('kPrice').value) || 0;
            const poster = document.getElementById('kPoster').files[0];
            const video = document.getElementById('kVideo').files[0];
            if(!title || !poster || !video) return alert("Fayllarni tanlang!");
            await db.movies.add({ title, price, poster, video });
            alert("Kino qo'shildi!");
            loadContent();
        }

        async function loadContent() {
            const movies = await db.movies.toArray();
            const heroList = document.getElementById('heroList');
            const normalList = document.getElementById('normalList');
            heroList.innerHTML = ''; normalList.innerHTML = '';
            movies.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                heroList.innerHTML += `<div class="swiper-slide"><img src="${img}" class="hero-img"></div>`;
                normalList.innerHTML += `<div class="movie-card"><img src="${img}"><div class="price-badge">${m.price} so'm</div><div style="padding:10px">${m.title}</div></div>`;
            });
            new Swiper('.hero-swiper', { slidesPerView: 'auto', centeredSlides: true, loop: true, spaceBetween: 10, autoplay: {delay:3000} });
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        init();
    </script>
</body>
</html>
