<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PREMIUM</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #000; --accent: #00ff73; --border: #222; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .tap-active:active { transform: scale(0.95); opacity: 0.8; }
        
        /* NAV BAR */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .siz-btn-oval { display: inline-flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 4px 14px; border-radius: 30px; border: 1.5px solid #333; }
        .nav-avatar-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* PAGES */
        .page { display: none; padding: 15px 5%; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* MOVIE CARDS */
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .movie-card { width: 100%; position: relative; }
        .movie-card img { width: 100%; height: 160px; border-radius: 20px; object-fit: cover; border: 1px solid var(--border); }
        .price-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #000; padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 5; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2500; overflow-y: auto; }
        .modal-content { background: #111; border-radius: 30px; padding: 25px; margin: 30px 15px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 12px; font-size: 16px; }
        .btn-adm { background: var(--accent); color: #000; width: 100%; padding: 16px; border-radius: 12px; font-weight: 900; border: none; margin-bottom: 10px; cursor: pointer; }

        /* PLAYER & DETAIL */
        .detail-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .detail-hero { position: relative; width: 100%; height: 450px; }
        .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
        .detail-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, #000 20%, transparent 80%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; box-sizing: border-box; }
        .part-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .part-btn { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; text-align: center; }
        .part-btn.selected { background: var(--accent); color: #000; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; }
        
        .history-card { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .hero-swiper { width: 100%; height: 320px; margin-bottom: 20px; }
        .swiper-slide { width: 85% !important; border-radius: 25px; overflow: hidden; transform: scale(0.9); transition: 0.3s; }
        .swiper-slide-active { transform: scale(1); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .del-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- ASOSIY SAHIFA -->
    <div id="home" class="page active">
        <div class="swiper hero-swiper"><div class="swiper-wrapper" id="heroList"></div></div>
        <div style="font-weight: 900; font-size: 20px; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px;">Kinolar</div>
        <div class="movie-grid" id="normalList"></div>
    </div>

    <!-- QIDIRUV -->
    <div id="search" class="page">
        <input type="text" id="searchInput" placeholder="Kino nomini yozing..." oninput="searchMovie()" style="margin-top:20px;">
        <div class="movie-grid" id="searchResult"></div>
    </div>

    <!-- MENING -->
    <div id="mening" class="page">
        <h3>Ko'rilganlar</h3>
        <div id="historyList" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:15px;"></div>
        <h3>To'lovlar</h3>
        <div id="trxList"></div>
    </div>

    <!-- PROFIL (SIZ) -->
    <div id="siz" class="page">
        <div style="display: flex; align-items: center; gap: 20px; padding: 30px 0;">
            <img src="" id="mainAvatar" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--accent);">
            <div>
                <h2 id="tgName" style="margin:0;">Yuklanmoqda...</h2>
                <div id="premTimer" style="font-size: 13px; color: var(--accent); margin-top: 5px;"></div>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="tap-active" onclick="openPremModal()" style="background:#111; padding:20px; border-radius:20px; border:1px solid #333;">
                <span style="color:red; font-size:11px;">PREMIUM</span><br><strong>Sotib olish</strong>
            </div>
            <div class="tap-active" onclick="openDepModal()" style="background:#111; padding:20px; border-radius:20px; border:1px solid #333;">
                <span style="color:#888; font-size:11px;">BALANS</span><br><strong id="userBalance">0 so'm</strong>
            </div>
        </div>
        <div style="margin-top:20px; background:#111; border-radius:15px; overflow:hidden;">
            <div class="tap-active" style="padding:18px; border-bottom:1px solid #222;" onclick="showAdminLogin()"><i class="fa fa-user-shield" style="margin-right:15px; color:var(--accent);"></i> Admin Panel</div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="modal">
        <div style="padding:20px;">
            <h2 style="display:flex; justify-content:space-between;">Admin <span onclick="closeModal('adminPanel')">&times;</span></h2>
            
            <div class="modal-content">
                <h3>Sozlamalar</h3>
                <input type="text" id="setToken" placeholder="Bot Token">
                <input type="text" id="setAdminId" placeholder="Admin Chat ID">
                <input type="text" id="setCard" placeholder="Karta raqami">
                <button class="btn-adm" onclick="saveSettings()">SOZLAMALARNI SAQLASH</button>
            </div>

            <div class="modal-content">
                <h3>Kino Joylash</h3>
                <input type="text" id="kTitle" placeholder="Kino nomi">
                <input type="text" id="kGenre" placeholder="Janr">
                <input type="number" id="kPrice" placeholder="Narxi">
                <small>Poster rasm:</small><input type="file" id="kPoster" accept="image/*">
                <div id="vFields"><div style="border:1px dashed #444; padding:10px; margin-bottom:10px;"><input type="file" class="vInps" accept="video/*"></div></div>
                <button class="btn-adm" style="background:#333; color:white;" onclick="addVField()">+ Qism qo'shish</button>
                <button class="btn-adm" onclick="saveKino()">YUKLASH</button>
            </div>

            <div class="modal-content">
                <h3>Foydalanuvchi Balansi</h3>
                <input type="number" id="admUserId" placeholder="Foydalanuvchi ID (Botdan oling)">
                <input type="number" id="admSum" placeholder="Qo'shiladigan summa">
                <button class="btn-adm" onclick="addBalanceManual()">BALANSNI TO'LDIRISH</button>
            </div>

            <div class="modal-content">
                <h3>Kinolarni boshqarish</h3>
                <div id="adminMovies"></div>
            </div>
        </div>
    </div>

    <!-- MODALLAR -->
    <div id="loginModal" class="modal"><div class="modal-content" style="max-width:300px; margin:150px auto;"><h3>Admin Parol</h3><input type="password" id="admPass"><button class="btn-adm" onclick="checkAdmin()">KIRISH</button></div></div>
    <div id="depModal" class="modal"><div class="modal-content"><h2>To'ldirish</h2><div id="cardText" style="background:var(--accent); color:#000; padding:20px; border-radius:15px; font-weight:900; margin-bottom:15px;" onclick="copyCard()">...</div><input type="number" id="dSum" placeholder="Summa"><input type="file" id="dImg" accept="image/*"><button class="btn-adm" onclick="sendDep()">TASDIQLASHGA YUBORISH</button></div></div>
    <div id="premModal" class="modal"><div class="modal-content"><h2>Tariflar</h2><div id="pList"></div><button class="btn-adm" onclick="closeModal('premModal')">YOPISH</button></div></div>

    <!-- DETAIL SAHIFA -->
    <div id="detailPage" class="detail-page">
        <i class="fa fa-arrow-left" onclick="closeDetail()" style="position:fixed; top:25px; left:20px; z-index:2100; font-size:22px;"></i>
        <div id="detailContent"></div>
    </div>

    <!-- VIDEO PLAYER -->
    <div id="player">
        <i class="fa fa-arrow-left" onclick="closePlayer()" style="position:absolute; top:25px; left:20px; z-index:3020; font-size:22px;"></i>
        <video id="mainVideo" style="width:100%; height:100%;" playsinline controls></video>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item active tap-active" onclick="showPage('home', this)"><i class="fa fa-home"></i><br>Asosiy</div>
        <div class="nav-item tap-active" onclick="showPage('search', this)"><i class="fa fa-search"></i><br>Qidiruv</div>
        <div class="nav-item tap-active" onclick="showPage('mening', this)"><i class="fa fa-bookmark"></i><br>Mening</div>
        <div class="nav-item tap-active" onclick="showPage('siz', this)"><div class="siz-btn-oval"><img src="" id="navAvatar" class="nav-avatar-img"><b>Siz</b></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const db = new Dexie("KinoDrama_vFinal");
        db.version(1).stores({
            movies: "++id, title, genre, price",
            profile: "key, value",
            settings: "key, value",
            plans: "++id, name, price",
            history: "++id, mId, time",
            trxs: "++id, type, amount, date"
        });

        const tg = window.Telegram.WebApp;
        let currentUserId = 0;

        async function init() {
            if (tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                currentUserId = u.id;
                await db.profile.put({ key: 'user_info', value: { name: u.first_name, img: u.photo_url || "https://ui-avatars.com/api/?name="+u.first_name, id: u.id } });
            }
            if(!(await db.profile.get('balance'))) await db.profile.put({key:'balance', value: 0});
            if(!(await db.profile.get('expiry'))) await db.profile.put({key:'expiry', value: 0});
            
            loadUI(); loadContent(); loadAdminSettings(); tg.expand();
            setInterval(updateCountdown, 1000);
        }

        async function loadAdminSettings() {
            const token = await db.settings.get('token');
            const adminId = await db.settings.get('admin_id');
            const card = await db.settings.get('card');
            if(token) document.getElementById('setToken').value = token.value;
            if(adminId) document.getElementById('setAdminId').value = adminId.value;
            if(card) {
                document.getElementById('setCard').value = card.value;
                document.getElementById('cardText').innerText = card.value;
            }
        }

        async function saveSettings() {
            await db.settings.put({key:'token', value: document.getElementById('setToken').value});
            await db.settings.put({key:'admin_id', value: document.getElementById('setAdminId').value});
            await db.settings.put({key:'card', value: document.getElementById('setCard').value});
            alert("Saqlandi!"); loadAdminSettings();
        }

        async function saveKino() {
            const title = document.getElementById('kTitle').value, genre = document.getElementById('kGenre').value, price = parseInt(document.getElementById('kPrice').value)||0, poster = document.getElementById('kPoster').files[0];
            let videos = []; document.querySelectorAll('.vInps').forEach(i => { if(i.files[0]) videos.push(i.files[0]); });
            if(!title || !poster || videos.length==0) return alert("Barcha maydonlar shart!");
            await db.movies.add({title, genre, price, poster, videos});
            alert("Kino joylandi!");
            // Formani tozalash
            document.getElementById('kTitle').value=''; document.getElementById('kGenre').value=''; document.getElementById('kPrice').value=''; document.getElementById('kPoster').value='';
            document.getElementById('vFields').innerHTML = '<div border:1px dashed #444; padding:10px; margin-bottom:10px;"><input type="file" class="vInps" accept="video/*"></div>';
            loadContent();
        }

        async function deleteMovie(id) {
            if(confirm("O'chirilsinmi?")) { await db.movies.delete(id); loadContent(); }
        }

        // QIDIRUV
        async function searchMovie() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const ms = await db.movies.toArray();
            const container = document.getElementById('searchResult');
            container.innerHTML = '';
            ms.filter(m => m.title.toLowerCase().includes(query)).forEach(m => {
                const img = URL.createObjectURL(m.poster);
                container.innerHTML += `<div class="movie-card tap-active" onclick="openMovie(${m.id})"><img src="${img}"><div style="font-weight:900;margin-top:8px;">${m.title}</div></div>`;
            });
        }

        // BOTGA TUGMALAR BILAN XABAR YUBORISH
        async function sendDep() {
            const sum = document.getElementById('dSum').value;
            const token = (await db.settings.get('token'))?.value;
            const adminId = (await db.settings.get('admin_id'))?.value;
            const user = (await db.profile.get('user_info'))?.value;
            if(!sum || !token || !adminId) return alert("Bot sozlamalari xato!");

            const text = `💰 TO'LOV XABARI\n👤 Foydalanuvchi: ${user.name}\n🆔 ID: ${user.id}\n💵 Summa: ${sum} so'm`;
            const keyboard = {
                inline_keyboard: [
                    [{ text: "✅ Tasdiqlash", callback_data: `confirm_${user.id}_${sum}` }],
                    [{ text: "❌ Bekor qilish", callback_data: `reject_${user.id}` }]
                ]
            };

            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent(text)}&reply_markup=${JSON.stringify(keyboard)}`)
            .then(() => { alert("Xabar botga yuborildi!"); closeModal('depModal'); });
        }

        // ADMIN PANELDA MANUAL BALANS QO'SHISH (Bot tugmasi ishlamasa ishlatish uchun)
        async function addBalanceManual() {
            const uId = parseInt(document.getElementById('admUserId').value);
            const sum = parseInt(document.getElementById('admSum').value);
            if(uId == currentUserId) {
                const bal = await db.profile.get('balance');
                await db.profile.put({key:'balance', value: bal.value + sum});
                await db.trxs.add({type: "Balans to'ldirildi (Admin)", amount: sum, date: new Date().toLocaleString()});
                alert("Pul qo'shildi!"); loadUI();
            } else { alert("Bu foydalanuvchi ID topilmadi (Lokal bazada faqat o'zingizni ko'rasiz)"); }
        }

        async function loadContent() {
            const ms = await db.movies.toArray();
            const hL = document.getElementById('heroList'), nL = document.getElementById('normalList'), aL = document.getElementById('adminMovies');
            hL.innerHTML = ''; nL.innerHTML = ''; aL.innerHTML = '';
            ms.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                hL.innerHTML += `<div class="swiper-slide tap-active" onclick="openMovie(${m.id})"><img src="${img}" class="hero-img"></div>`;
                nL.innerHTML += `<div class="movie-card tap-active" onclick="openMovie(${m.id})"><img src="${img}"><div style="font-weight:900;margin-top:8px;">${m.title}</div></div>`;
                aL.innerHTML += `<div class="del-item"><span>${m.title}</span><button onclick="deleteMovie(${m.id})" style="background:red;border:none;color:white;padding:5px;border-radius:5px;">O'chirish</button></div>`;
            });
            new Swiper('.hero-swiper', { slidesPerView: 'auto', centeredSlides: true, loop: true, spaceBetween: 15, autoplay: {delay:3000} });
        }

        async function loadUI() {
            const info = await db.profile.get('user_info'), bal = await db.profile.get('balance');
            if(info) {
                document.getElementById('mainAvatar').src = info.value.img;
                document.getElementById('navAvatar').src = info.value.img;
                document.getElementById('tgName').innerText = info.value.name;
            }
            document.getElementById('userBalance').innerText = (bal.value || 0).toLocaleString() + " so'm";
        }

        // BOSHQA FUNKSIYALAR
        function showPage(id, el) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showAdminLogin() { document.getElementById('loginModal').style.display = 'block'; }
        function checkAdmin() { if(document.getElementById('admPass').value === 'Azizbek') { closeModal('loginModal'); document.getElementById('adminPanel').style.display = 'block'; } else alert('Xato!'); }
        function openDepModal() { document.getElementById('depModal').style.display = 'block'; }
        function copyCard() { navigator.clipboard.writeText(document.getElementById('cardText').innerText); alert("Karta nusxalandi!"); }
        function addVField() { const c = document.getElementById('vFields'); const d = document.createElement('div'); d.style="border:1px dashed #444; padding:10px; margin-bottom:10px;"; d.innerHTML = `<input type="file" class="vInps" accept="video/*">`; c.appendChild(d); }
        function closePlayer() { document.getElementById('mainVideo').pause(); document.getElementById('player').style.display = 'none'; }
        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }

        async function openMovie(id) {
            const m = await db.movies.get(id);
            const poster = URL.createObjectURL(m.poster);
            let parts = m.videos.map((v, i) => `<div class="part-btn tap-active" onclick="playVideo(${id}, ${i})">${i+1}-qism</div>`).join('');
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-hero"><img src="${poster}"><div class="detail-overlay">
                <h1 style="font-size:32px;">${m.title}</h1><div style="color:#ccc;">${m.genre}</div>
                <div class="part-grid">${parts}</div></div></div>`;
            document.getElementById('detailPage').style.display = 'block';
        }

        async function playVideo(id, idx) {
            const m = await db.movies.get(id), bal = await db.profile.get('balance'), exp = await db.profile.get('expiry');
            if(m.price == 0 || (exp && exp.value > Date.now())) {
                const v = document.getElementById('mainVideo'); v.src = URL.createObjectURL(m.videos[idx]);
                document.getElementById('player').style.display = 'block'; v.play();
                db.history.add({mId: id, time: Date.now()});
            } else {
                if(confirm(`Pullik: ${m.price} so'm. Sotib olasizmi?`)) {
                    if(bal.value >= m.price) {
                        await db.profile.put({key:'balance', value: bal.value - m.price});
                        await db.trxs.add({type: "Kino: "+m.title, amount: -m.price, date: new Date().toLocaleString()});
                        loadUI(); playVideo(id, idx);
                    } else alert("Mablag' kam!");
                }
            }
        }

        async function updateCountdown() {
            const exp = await db.profile.get('expiry'), timerEl = document.getElementById('premTimer');
            if(!timerEl) return;
            const now = Date.now();
            if(exp && exp.value > now) {
                let diff = exp.value - now;
                let d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                timerEl.innerText = `Premium: ${d}k ${h}s ${m}m ${s}s qoldi`;
            } else { timerEl.innerText = "Premium: Faol emas"; }
        }

        init();
    </script>
</body>
</html>
