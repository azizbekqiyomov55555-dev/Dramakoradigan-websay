<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINO DRAMA PREMIUM</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { 
            --bg: #000; 
            --accent: #00ff73; 
            --card: #121212; 
            --border: #222;
        }

        body { 
            background: var(--bg); color: white; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding-bottom: 90px; overflow-x: hidden;
        }

        .tap-active { transition: transform 0.1s ease; cursor: pointer; }
        .tap-active:active { transform: scale(0.95); opacity: 0.8; }

        /* NAV BAR */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid var(--border); z-index: 1000; 
        }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .siz-btn-oval { 
            display: inline-flex; align-items: center; gap: 8px; 
            background: #1a1a1a; padding: 4px 14px; border-radius: 30px; 
            border: 1.5px solid #333; 
        }
        .nav-avatar-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* PAGES */
        .page { display: none; padding: 15px 5%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS */
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .movie-card { width: 100%; position: relative; }
        .movie-card img { width: 100%; height: 160px; border-radius: 20px; object-fit: cover; border: 1px solid #222; }
        .price-badge { 
            position: absolute; top: 10px; right: 10px; 
            background: var(--accent); color: #000; 
            padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 800; 
        }

        .status-card { 
            background: var(--card); padding: 20px; border-radius: 25px; 
            border: 1px solid var(--border); margin-bottom: 15px; 
        }

        /* MODALS */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(15px); z-index: 2000; overflow-y: auto;
        }
        .modal-content { 
            background: #111; border-radius: 30px; 
            padding: 25px; margin: 50px 15px; border: 1px solid var(--border);
        }

        /* MOVIE DETAIL STYLE (IMAGE) */
        .detail-header { position: relative; width: 100%; height: 350px; overflow: hidden; }
        .detail-poster { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .detail-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 20px; background: linear-gradient(0deg, #000 20%, transparent); text-align: center; }
        .detail-title { font-size: 42px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .detail-tags { display: flex; justify-content: center; gap: 10px; margin: 15px 0; color: #bbb; font-size: 14px; }
        .part-btn { background: #222; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 12px; font-weight: bold; margin: 5px; }

        input, select { 
            width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; 
            color: white; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; 
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            font-weight: 900; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-accent { background: var(--accent); color: #000; font-size: 18px; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #fff; }

        /* PLAYER OVERLAY */
        .player-controls {
            position: absolute; bottom: 30px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 40px; align-items: center; z-index: 10;
        }
        .control-btn { font-size: 30px; color: white; opacity: 0.8; }

        .hero-swiper { width: 100%; height: 350px; margin-bottom: 20px; }
        .swiper-slide { width: 85% !important; border-radius: 30px; overflow: hidden; transform: scale(0.9); transition: 0.3s; }
        .swiper-slide-active { transform: scale(1); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="toast" style="display:none; position:fixed; top:30px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; padding:10px 25px; border-radius:30px; font-weight:900; z-index:4000;"></div>

    <!-- BOSH SAHIFA -->
    <div id="home" class="page active">
        <div class="swiper hero-swiper">
            <div class="swiper-wrapper" id="heroList"></div>
        </div>
        <div style="font-weight: 900; font-size: 20px; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px;">Kinolar</div>
        <div class="movie-grid" id="normalList"></div>
    </div>

    <!-- QIDIRUV -->
    <div id="search" class="page">
        <input type="text" id="searchInput" placeholder="Kino qidirish..." oninput="searchMovie()" style="margin-top:20px;">
        <div class="movie-grid" id="searchResult"></div>
    </div>

    <!-- MENING -->
    <div id="mening" class="page">
        <h2 style="text-align:center">Kutubxonam</h2>
        <div id="purchasedList" class="movie-grid"></div>
    </div>

    <!-- SIZ (PROFIL) -->
    <div id="siz" class="page">
        <div style="display: flex; align-items: center; gap: 20px; padding: 30px 0;">
            <img src="" id="mainAvatar" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--accent);">
            <div>
                <h2 id="tgName" style="margin:0;">Yuklanmoqda...</h2>
                <div id="premiumTimer" style="font-size: 13px; color: var(--accent); font-weight: bold; margin-top: 5px;"></div>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="status-card tap-active" onclick="openPremiumModal()">
                <span style="color:#ff453a; font-size:12px; font-weight: 800;">PREMIUM</span><br>
                <strong style="font-size: 18px;">Sotib olish</strong>
            </div>
            <div class="status-card tap-active" onclick="openDepositModal()">
                <span style="color:#888; font-size:12px; font-weight: 800;">HISOB</span><br>
                <strong id="userBalance" style="font-size: 18px;">0 so'm</strong>
            </div>
        </div>
        <div class="status-card" style="padding:0; overflow:hidden; margin-top: 20px;">
            <div class="tap-active" style="padding:18px; border-bottom:1px solid #222;" onclick="showLoginModal()"><i class="fa fa-user-shield" style="margin-right:15px; color:var(--accent);"></i> Admin Panel</div>
        </div>
    </div>

    <!-- KINO DETALLARI MODAL -->
    <div id="movieDetailModal" class="modal" style="padding:0;">
        <i class="fa fa-arrow-left" onclick="closeModal('movieDetailModal')" style="position:fixed; top:25px; left:20px; z-index:2100; font-size:22px; text-shadow: 0 0 10px #000;"></i>
        <div id="detailContent"></div>
    </div>

    <!-- PLAYER -->
    <div id="player" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000;">
        <i class="fa fa-arrow-left" onclick="closePlayer()" style="position:absolute; top:25px; left:20px; z-index:3010; font-size:22px;"></i>
        <video id="mainVideo" style="width:100%; height:100%;" playsinline></video>
        
        <div class="player-controls">
            <i class="fa fa-backward-step control-btn" onclick="skipVideo(-10)"></i>
            <i id="playPauseBtn" class="fa fa-pause control-btn" onclick="togglePlay()"></i>
            <i class="fa fa-forward-step control-btn" onclick="skipVideo(10)"></i>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="modal" style="background:#000;">
        <div style="padding:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Admin Panel</h2>
                <button onclick="closeModal('adminPanel')" style="background:none; border:none; color:#fff; font-size:24px;">&times;</button>
            </div>
            <div class="status-card">
                <h3>Bot Sozlamalari</h3>
                <input type="text" id="setBotToken" placeholder="Bot Token">
                <input type="text" id="setAdminId" placeholder="Admin Chat ID">
                <button class="btn btn-accent" onclick="saveBotSettings()">BOTNI SAQLASH</button>
            </div>
            <div class="status-card">
                <h3>Yangi Kino Qo'shish</h3>
                <input type="text" id="kTitle" placeholder="Kino nomi">
                <input type="text" id="kGenre" placeholder="Janr (Drama, Melodrama...)">
                <input type="number" id="kPrice" placeholder="Narxi (0 = Tekin)">
                <small>Poster rasm:</small><input type="file" id="kPoster" accept="image/*">
                <div id="partsContainer">
                    <div style="border:1px dashed #444; padding:10px; border-radius:10px; margin-bottom:10px;">
                        <small>1-qism video:</small><input type="file" class="kVideoFile" accept="video/*">
                    </div>
                </div>
                <button class="btn btn-outline" onclick="addPartInput()" style="margin-bottom:10px;">+ Yana qism qo'shish</button>
                <button class="btn btn-accent" onclick="saveKino()">YUKLASH</button>
            </div>
            <div id="delList"></div>
        </div>
    </div>

    <!-- BOSHQA MODALLAR (LOGIN, DEPOSIT, PREMIUM) - OLDINGI KODDAGI BILAN BIR XIL -->
    <div id="loginModal" class="modal">
        <div class="modal-content" style="max-width:300px; margin:100px auto;">
            <h3 style="text-align:center;">Admin Kirish</h3>
            <input type="text" id="admLogin" placeholder="Login">
            <input type="password" id="admPass" placeholder="Parol">
            <button class="btn btn-accent" onclick="checkAdminLogin()">KIRISH</button>
        </div>
    </div>

    <div id="depositModal" class="modal"><div class="modal-content">
        <h2>Hisobni to'ldirish</h2>
        <div id="displayCard" style="background:linear-gradient(135deg,#00ff73,#008f41); padding:20px; border-radius:15px; color:#000; margin-bottom:15px; font-weight:900;" onclick="copyCard()">8600 0000 0000 0000</div>
        <input type="number" id="depAmount" placeholder="Summa">
        <input type="file" id="depCheck" accept="image/*">
        <button class="btn btn-accent" onclick="submitDeposit()">TO'LOVNI YUBORISH</button>
        <button class="btn btn-outline" style="margin-top:10px;" onclick="closeModal('depositModal')">YOPISH</button>
    </div></div>

    <!-- NAV -->
    <div class="bottom-nav">
        <div class="nav-item active tap-active" onclick="showPage('home', this)"><i class="fa fa-home"></i><br>Asosiy</div>
        <div class="nav-item tap-active" onclick="showPage('search', this)"><i class="fa fa-search"></i><br>Qidiruv</div>
        <div class="nav-item tap-active" onclick="showPage('mening', this)"><i class="fa fa-bookmark"></i><br>Mening</div>
        <div class="nav-item tap-active" onclick="showPage('siz', this)">
            <div class="siz-btn-oval"><img src="" id="navAvatar" class="nav-avatar-img"><b>Siz</b></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const db = new Dexie("KinoDramaDB_V2");
        db.version(1).stores({
            movies: "++id, title, price, genre",
            profile: "key, value",
            settings: "key, value"
        });

        const tg = window.Telegram.WebApp;

        async function init() {
            if (tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                await db.profile.put({ key: 'user_info', value: { name: user.first_name, img: user.photo_url || "https://ui-avatars.com/api/?name="+user.first_name, id: user.id } });
            }
            if(!(await db.profile.get('balance'))) await db.profile.put({key:'balance', value: 0});
            if(!(await db.profile.get('expiry'))) await db.profile.put({key:'expiry', value: 0});
            
            loadUI(); loadContent(); tg.expand();
        }

        async function loadUI() {
            const info = await db.profile.get('user_info');
            const bal = await db.profile.get('balance');
            const exp = await db.profile.get('expiry');
            if(info) {
                document.getElementById('mainAvatar').src = info.value.img;
                document.getElementById('navAvatar').src = info.value.img;
                document.getElementById('tgName').innerText = info.value.name;
            }
            document.getElementById('userBalance').innerText = (bal.value || 0).toLocaleString() + " so'm";
            
            const now = Date.now();
            if(exp.value > now) {
                document.getElementById('premiumTimer').innerText = "Premium: Faol ✅";
            } else {
                document.getElementById('premiumTimer').innerText = "Premium: Faol emas ❌";
            }
        }

        // ADMIN FUNCTIONS
        function addPartInput() {
            const container = document.getElementById('partsContainer');
            const partNum = container.children.length + 1;
            const div = document.createElement('div');
            div.style = "border:1px dashed #444; padding:10px; border-radius:10px; margin-bottom:10px;";
            div.innerHTML = `<small>${partNum}-qism video:</small><input type="file" class="kVideoFile" accept="video/*">`;
            container.appendChild(div);
        }

        async function saveKino() {
            const title = document.getElementById('kTitle').value;
            const genre = document.getElementById('kGenre').value || "Drama";
            const price = parseInt(document.getElementById('kPrice').value) || 0;
            const poster = document.getElementById('kPoster').files[0];
            const videoInputs = document.querySelectorAll('.kVideoFile');
            
            let videos = [];
            for(let input of videoInputs) {
                if(input.files[0]) videos.push(input.files[0]);
            }

            if(!title || !poster || videos.length === 0) return alert("Barcha maydonlarni to'ldiring!");

            await db.movies.add({ title, genre, price, poster, videos });
            alert("Kino muvaffaqiyatli yuklandi!");
            location.reload();
        }

        // MOVIE DETAILS & PLAYING
        async function openDetails(id) {
            const m = await db.movies.get(id);
            const posterUrl = URL.createObjectURL(m.poster);
            
            let partsHtml = m.videos.map((v, index) => 
                `<button class="part-btn tap-active" onclick="checkAndPlay(${m.id}, ${index})">${index + 1}-qism</button>`
            ).join('');

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-header">
                    <img src="${posterUrl}" class="detail-poster">
                    <div class="detail-info">
                        <h1 class="detail-title">${m.title}</h1>
                        <div class="detail-tags">
                            <span>Turkiya</span> • <span>18+</span> • <span>2023</span>
                        </div>
                        <div class="detail-tags">${m.genre}</div>
                        <button class="btn btn-accent" onclick="checkAndPlay(${m.id}, 0)">
                            <i class="fa fa-play"></i> Ko'rish
                        </button>
                    </div>
                </div>
                <div style="padding:20px;">
                    <h3 style="margin-top:0;">Qismlar:</h3>
                    <div style="display:flex; flex-wrap:wrap;">${partsHtml}</div>
                </div>
            `;
            document.getElementById('movieDetailModal').style.display = 'block';
        }

        async function checkAndPlay(mId, partIndex) {
            const m = await db.movies.get(mId);
            const bal = await db.profile.get('balance');
            const exp = await db.profile.get('expiry');

            if(m.price === 0 || exp.value > Date.now()) {
                startPlayer(m.videos[partIndex]);
            } else {
                if(confirm(`Kino pullik: ${m.price} so'm. Sotib olasizmi?`)) {
                    if(bal.value >= m.price) {
                        await db.profile.put({key:'balance', value: bal.value - m.price});
                        loadUI(); startPlayer(m.videos[partIndex]);
                    } else { alert("Mablag' yetarli emas!"); }
                }
            }
        }

        function startPlayer(videoBlob) {
            const p = document.getElementById('player');
            const v = document.getElementById('mainVideo');
            v.src = URL.createObjectURL(videoBlob);
            p.style.display = 'block';
            v.play();
            
            // Avtomatik yonbosh qilishga urinish
            if(v.requestFullscreen) v.requestFullscreen();
            else if(v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        }

        function togglePlay() {
            const v = document.getElementById('mainVideo');
            const btn = document.getElementById('playPauseBtn');
            if(v.paused) { v.play(); btn.className = 'fa fa-pause control-btn'; }
            else { v.pause(); btn.className = 'fa fa-play control-btn'; }
        }

        function skipVideo(sec) {
            document.getElementById('mainVideo').currentTime += sec;
        }

        function closePlayer() {
            const v = document.getElementById('mainVideo');
            v.pause();
            document.getElementById('player').style.display = 'none';
            if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

        // BOT INTEGRATION WITH BUTTONS
        async function saveBotSettings() {
            const tok = document.getElementById('setBotToken').value;
            const aid = document.getElementById('setAdminId').value;
            await db.settings.put({key:'bot_token', value: tok});
            await db.settings.put({key:'admin_id', value: aid});
            alert("Saqlandi!");
        }

        async function submitDeposit() {
            const sum = document.getElementById('depAmount').value;
            const check = document.getElementById('depCheck').files[0];
            const info = await db.profile.get('user_info');
            const tok = (await db.settings.get('bot_token'))?.value;
            const aid = (await db.settings.get('admin_id'))?.value;

            if(!sum || !check || !tok) return alert("Xatolik! Ma'lumotlarni to'ldiring.");

            const msg = `💰 YANGI TO'LOV!\n👤 Kimdan: ${info.value.name}\n🆔 ID: ${info.value.id}\n💵 Summa: ${sum} so'm`;
            
            // Botga tugmalar bilan yuborish
            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "✅ Tasdiqlash", callback_data: `confirm_${info.value.id}_${sum}` },
                        { text: "❌ Bekor qilish", callback_data: `cancel_${info.value.id}` }
                    ]
                ]
            };

            const fd = new FormData();
            fd.append('chat_id', aid);
            fd.append('photo', check);
            fd.append('caption', msg);
            fd.append('reply_markup', JSON.stringify(keyboard));

            try {
                await fetch(`https://api.telegram.org/bot${tok}/sendPhoto`, { method: 'POST', body: fd });
                alert("Xabar yuborildi! Admin tasdiqlashi bilan hisobingiz to'ladi.");
                closeModal('depositModal');
            } catch(e) { alert("Xatolik yuz berdi!"); }
        }

        // UI HELPERS
        async function loadContent() {
            const movies = await db.movies.toArray();
            const hL = document.getElementById('heroList');
            const nL = document.getElementById('normalList');
            hL.innerHTML = ''; nL.innerHTML = '';

            movies.forEach(m => {
                const img = URL.createObjectURL(m.poster);
                const badge = m.price > 0 ? `<div class="price-badge">${m.price} so'm</div>` : `<div class="price-badge" style="background:#fff;">TEKIN</div>`;
                hL.innerHTML += `<div class="swiper-slide" onclick="openDetails(${m.id})">${badge}<img src="${img}" class="hero-img"></div>`;
                nL.innerHTML += `<div class="movie-card tap-active" onclick="openDetails(${m.id})">${badge}<img src="${img}"><div style="margin-top:8px; font-weight:bold; font-size:14px;">${m.title}</div><small style="color:#888">${m.genre}</small></div>`;
            });

            new Swiper('.hero-swiper', { slidesPerView: 'auto', centeredSlides: true, loop: true, spaceBetween: 15, autoplay: {delay:3500} });
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showLoginModal() { document.getElementById('loginModal').style.display = 'block'; }
        function openDepositModal() { document.getElementById('depositModal').style.display = 'block'; }
        function checkAdminLogin() {
            if(document.getElementById('admLogin').value === 'Aziz' && document.getElementById('admPass').value === 'Azizbek') {
                closeModal('loginModal');
                document.getElementById('adminPanel').style.display = 'block';
            } else alert("Xato!");
        }
        function copyCard() {
            navigator.clipboard.writeText("8600000000000000");
            alert("Karta nusxalandi!");
        }

        init();
    </script>
</body>
</html>
